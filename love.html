<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💖 星河与你 💖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
        }

        /* 深邃星空 */
        .night-sky {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starGlow 4s infinite alternate ease-in-out;
        }
        @keyframes starGlow {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 0.8; transform: scale(1); }
        }

        /* 金色萤火虫粒子 */
        .firefly-particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;
        }
        .firefly {
            position: absolute;
            width: 3px; height: 3px;
            background: #f0e68c;
            border-radius: 50%;
            box-shadow: 0 0 8px 3px #ffd700, 0 0 20px 6px #daa520;
            animation: fireflyFloat 8s linear infinite;
            opacity: 0;
        }
        @keyframes fireflyFloat {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(-300px) translateX(30px); opacity: 0.7; }
            100% { transform: translateY(-600px) translateX(-20px); opacity: 0; }
        }

        /* 中央内容 */
        .heart-container {
            z-index: 10;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        .heart {
            font-size: 12rem;
            line-height: 1;
            animation: heartBeat 1.8s ease infinite;
            filter: drop-shadow(0 0 40px rgba(255,105,180,0.6));
            background: linear-gradient(135deg, #ff4d6d, #ffb3c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.12); }
            30% { transform: scale(1); }
            45% { transform: scale(1.08); }
            60% { transform: scale(1); }
        }

        /* 诗句 */
        .message {
            color: #e0e0e0;
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
            opacity: 0;
            animation: fadeInText 2s ease 1s forwards;
        }
        @keyframes fadeInText {
            to { opacity: 1; }
        }

        /* 名字 - 调整位置更醒目 */
        .name {
            font-size: 3rem;
            font-weight: bold;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #fff3b0, #ffb3c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(255,180,200,0.6));
            letter-spacing: 4px;
        }

        .back-link {
            margin-top: 1.5rem;
            padding: 0.6rem 2rem;
            border-radius: 30px;
            background: rgba(255,255,255,0.05);
            color: #ffb3c6;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.4s;
            backdrop-filter: blur(5px);
        }
        .back-link:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 20px rgba(255,105,180,0.3);
            color: white;
        }
    </style>
</head>
<body>
    <!-- 星空 -->
    <div class="night-sky" id="nightSky"></div>
    <!-- 萤火虫 -->
    <div class="firefly-particles" id="fireflies"></div>

    <!-- 主内容 -->
    <div class="heart-container">
        <div class="heart">❤️</div>
        <div class="message">你是我宇宙中最温柔的星河</div>
        <div class="name">熊国会</div>
        <a href="notepad.html" class="back-link">📝 回到记事本</a>
    </div>

    <script>
        // 生成星星
        const sky = document.getElementById('nightSky');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = 1 + Math.random() * 2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = (3 + Math.random() * 5) + 's';
            sky.appendChild(star);
        }

        // 生成萤火虫
        const firefliesContainer = document.getElementById('fireflies');
        function createFirefly() {
            const firefly = document.createElement('div');
            firefly.className = 'firefly';
            firefly.style.left = Math.random() * 100 + '%';
            firefly.style.top = 80 + Math.random() * 20 + '%';
            firefly.style.animationDelay = Math.random() * 3 + 's';
            firefly.style.animationDuration = (6 + Math.random() * 8) + 's';
            firefliesContainer.appendChild(firefly);
            firefly.addEventListener('animationend', () => firefly.remove());
        }
        setInterval(createFirefly, 1500);
        for (let i = 0; i < 10; i++) setTimeout(createFirefly, i * 300);
    </script>
</body>
</html>
