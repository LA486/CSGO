<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>熊国会专属 · 夏日清风 · 泰迪熊视频惊喜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f9d8c6 0%, #ffe6d5 35%, #b3e0ff 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, 'Poppins', 'Comic Neue', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* 主卡片，文字区域柔和精致 */
        .love-card {
            max-width: 850px;
            width: 100%;
            background: rgba(255, 250, 240, 0.88);
            backdrop-filter: blur(12px);
            border-radius: 80px 80px 80px 60px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 215, 175, 0.8) inset, 0 8px 20px rgba(255, 105, 180, 0.2);
            padding: 2rem 1.8rem;
            text-align: center;
            z-index: 15;
            transition: transform 0.2s ease;
            animation: gentleFloat 4s infinite ease-in-out;
        }

        .love-card:hover {
            transform: scale(1.01);
        }

        .breeze-text {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff8866, #ff4d6d, #ffaa55);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(255, 80, 100, 0.3);
            margin-bottom: 1.2rem;
            display: inline-block;
        }

        .cloud-section {
            background: rgba(255, 255, 245, 0.5);
            border-radius: 80px;
            padding: 1.2rem 1rem;
            margin: 1.5rem 0;
            backdrop-filter: blur(4px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .cloud-art {
            display: inline-block;
            text-align: left;
            background: rgba(255,245,235,0.4);
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .cloud-line {
            font-family: monospace, 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', 'Courier New', monospace;
            font-size: 1.5rem;
            white-space: pre;
            line-height: 1.65;
            letter-spacing: 1px;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.1));
            animation: floatCloud 3s infinite alternate ease-in-out;
            transform-origin: center;
            display: block;
        }

        .cloud-line:nth-child(1) { animation-duration: 2.8s; animation-delay: 0s; }
        .cloud-line:nth-child(2) { animation-duration: 3.4s; animation-delay: 0.2s; }
        .cloud-line:nth-child(3) { animation-duration: 2.5s; animation-delay: 0.5s; }
        .cloud-line:nth-child(4) { animation-duration: 3.2s; animation-delay: 0.1s; }

        .cool-breeze {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin: 1rem 0 0.8rem;
        }

        .cool-item {
            font-size: 1.8rem;
            display: inline-block;
            animation: spinFlurry 1.8s infinite alternate, floatUpSmall 2.2s infinite alternate;
            filter: drop-shadow(0 0 6px #aaffff);
        }

        .blessing {
            font-size: 1.9rem;
            font-weight: bold;
            background: linear-gradient(120deg, #ff6699, #ffbb77);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 1rem 0 0.5rem;
            letter-spacing: 2px;
        }

        .blessing-dual {
            font-size: 1.7rem;
            margin-top: 0.8rem;
            padding: 0.6rem;
            border-top: 2px dashed #ffb387;
            border-bottom: 2px dashed #ffb387;
            display: inline-block;
            background: rgba(255,200,180,0.3);
            border-radius: 60px;
        }

        @keyframes floatCloud {
            0% { transform: translateX(0px) translateY(0px) rotate(0deg); }
            100% { transform: translateX(8px) translateY(-5px) rotate(0.8deg); }
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-6px); }
        }

        @keyframes spinFlurry {
            0% { transform: rotate(0deg) scale(0.9); opacity: 0.7; }
            100% { transform: rotate(12deg) scale(1.2); opacity: 1; }
        }

        @keyframes floatUpSmall {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }

        /* 吹风粒子 */
        .floating-particle {
            position: fixed;
            pointer-events: none;
            z-index: 20;
            font-size: 1.4rem;
            animation: blowWind 6s linear forwards;
            filter: drop-shadow(0 0 4px cyan);
        }

        @keyframes blowWind {
            0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateX(180px) translateY(-120px) rotate(360deg); opacity: 0; }
        }

        /* 背景大云 */
        .bg-cloud {
            position: fixed;
            background: rgba(255, 255, 250, 0.7);
            border-radius: 1000px;
            filter: blur(20px);
            z-index: 0;
            pointer-events: none;
            animation: bgCloudMove 20s infinite alternate ease-in-out;
        }

        @keyframes bgCloudMove {
            0% { transform: translateX(-3%) translateY(0%); }
            100% { transform: translateX(5%) translateY(-8%); }
        }

        .fan-icon {
            display: inline-block;
            animation: fanSwing 2s infinite ease;
            font-size: 1.9rem;
            margin-right: 6px;
        }

        @keyframes fanSwing {
            0% { transform: rotate(-15deg); }
            100% { transform: rotate(15deg); }
        }

        @keyframes clickPopFade {
            0% { transform: scale(0.3) translateY(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-40px); opacity: 0; }
        }

        @keyframes floatUpHeart {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(-120vh) rotate(25deg); opacity: 0; }
        }

        /* 响应式调整 */
        @media (max-width: 620px) {
            .love-card { padding: 1.2rem; }
            .cloud-line { font-size: 0.95rem; line-height: 1.45; white-space: pre-wrap; word-break: keep-all; }
            .cloud-art { padding: 0.3rem 0.6rem; }
            .breeze-text { font-size: 1.6rem; }
            .blessing { font-size: 1.4rem; }
            .cool-item { font-size: 1.3rem; }
        }

        /* ========= 泰迪熊容器 右下角 ========= */
        .teddy-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .teddy-container:hover {
            transform: scale(1.02);
        }
        .teddy-canvas {
            background: rgba(255, 245, 220, 0.3);
            border-radius: 60px;
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2), 0 0 0 2px rgba(255,215,150,0.6);
            transition: all 0.2s;
            width: 150px;
            height: 150px;
            display: block;
        }
        .teddy-tip {
            background: rgba(255,255,210,0.85);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #b45f2b;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            white-space: nowrap;
            font-family: inherit;
            animation: tipPulse 1.2s infinite alternate;
        }
        @keyframes tipPulse {
            0% { opacity: 0.7; transform: scale(0.95);}
            100% { opacity: 1; transform: scale(1.05);}
        }
        @media (max-width: 550px) {
            .teddy-canvas { width: 120px; height: 120px; }
            .teddy-tip { font-size: 0.7rem; white-space: nowrap; }
            .teddy-container { bottom: 12px; right: 12px; }
        }

        /* ========= 视频模态框 (新页面效果) ========= */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .video-modal.active {
            display: flex;
        }
        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            background: #1e1a1a;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 2px solid #ffcd94;
            text-align: center;
        }
        .modal-content video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 24px;
            display: block;
            margin: 0 auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .close-modal {
            position: absolute;
            top: 8px;
            right: 18px;
            font-size: 2rem;
            color: #ffcf9a;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            font-weight: bold;
        }
        .close-modal:hover {
            background: #ff8866;
            color: white;
            transform: scale(1.1);
        }
        .video-caption {
            margin-top: 12px;
            color: #ffecb3;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @media (max-width: 650px) {
            .modal-content { padding: 12px; }
            .close-modal { top: 2px; right: 8px; width: 32px; height: 32px; font-size: 1.6rem; }
            .video-caption { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="love-card">
    <div class="breeze-text">
        <span class="fan-icon">🌀</span> 老婆天热我给你吹吹 <span class="fan-icon">🍃</span>
    </div>
    <div class="cloud-section">
        <div class="cloud-art">
            <div class="cloud-line">╭◜◝ ͡ ◜◝╮</div>
            <div class="cloud-line">(　　　`3´ )༄༅༄༅</div>
            <div class="cloud-line">╰◟◞ ͜ ◟◞╯　　༄༅༄༅ ❄️ ❄️ ❄️</div>
            <div class="cloud-line">༄༅ ❄️ ❄️</div>
        </div>
    </div>
    <div class="cool-breeze">
        <span class="cool-item">❄️</span>
        <span class="cool-item">🍃</span>
        <span class="cool-item">💨</span>
        <span class="cool-item">❄️</span>
        <span class="cool-item">✨</span>
    </div>
    <div class="blessing">
        🎉熊国会天下第一好！小狗永远爱你🎉
    </div>
    <div class="blessing blessing-dual">
        🎉熊国会天下第一好！小狗永远爱你🎉
    </div>
    <div style="margin-top: 1rem; font-size:1rem; color:#b45f3b;">
        <span>💨 微风拂面 · 爱意永存 💖</span>
    </div>
</div>

<div id="bgCloudContainer"></div>

<!-- 右下角泰迪熊交互区域 -->
<div class="teddy-container" id="teddyContainer">
    <canvas id="teddyCanvas" class="teddy-canvas" width="150" height="150"></canvas>
    <div class="teddy-tip" id="teddyTip">🐻 单击看视频 · 双击换动作</div>
</div>

<!-- 视频模态框（新页面中间区域） -->
<div id="videoModal" class="video-modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <video id="loveVideo" controls autoplay muted playsinline>
            <source src="321.mp4" type="video/mp4">
            您的浏览器不支持 video 标签。
        </video>
        <div class="video-caption">❤️ 专属回忆 · 温暖时光 ❤️</div>
    </div>
</div>

<script>
    (function() {
        // ========= 保留原有吹风粒子 & 背景云 & 爱心效果 =========
        const bodyEl = document.body;
        let particleInterval = null;
        const coolItems = ['❄️', '🍃', '💨', '✨', '💙', '🌸', '💧', '🌀', '❤️', '🎐'];
        
        function createWindParticle() {
            const particle = document.createElement('div');
            particle.classList.add('floating-particle');
            const randomIcon = coolItems[Math.floor(Math.random() * coolItems.length)];
            particle.innerHTML = randomIcon;
            const size = 1 + Math.random() * 1.2;
            particle.style.fontSize = `${size}rem`;
            const startX = Math.random() * window.innerWidth;
            const startY = window.innerHeight + 20;
            particle.style.left = `${startX}px`;
            particle.style.top = `${startY}px`;
            const duration = 4 + Math.random() * 3;
            particle.style.animation = `blowWind ${duration}s linear forwards`;
            particle.style.transform = `rotate(${Math.random() * 60}deg)`;
            bodyEl.appendChild(particle);
            particle.addEventListener('animationend', () => { if(particle && particle.remove) particle.remove(); });
        }
        
        function startCoolBreeze() {
            if (particleInterval) clearInterval(particleInterval);
            particleInterval = setInterval(() => {
                if (document.hidden) return;
                const count = Math.floor(Math.random() * 2) + 1;
                for(let i=0; i<count; i++) createWindParticle();
            }, 700);
        }
        
        function createBgClouds() {
            const container = document.getElementById('bgCloudContainer');
            if(!container) return;
            container.innerHTML = '';
            const cloudCount = 5;
            for(let i=0; i<cloudCount; i++) {
                const cloud = document.createElement('div');
                cloud.classList.add('bg-cloud');
                const sizeW = 200 + Math.random() * 350;
                const sizeH = 100 + Math.random() * 180;
                cloud.style.width = `${sizeW}px`;
                cloud.style.height = `${sizeH}px`;
                cloud.style.left = `${Math.random() * 80}%`;
                cloud.style.top = `${Math.random() * 80}%`;
                cloud.style.opacity = 0.3 + Math.random() * 0.3;
                cloud.style.background = `radial-gradient(circle, rgba(255,245,230,0.8) 0%, rgba(255,220,190,0.5) 100%)`;
                cloud.style.animationDelay = `${Math.random() * 10}s`;
                cloud.style.animationDuration = `${18 + Math.random() * 15}s`;
                container.appendChild(cloud);
            }
        }
        
        function createFloatingHearts() {
            setInterval(() => {
                if(document.hidden) return;
                const heartSpan = document.createElement('div');
                heartSpan.style.position = 'fixed';
                heartSpan.style.bottom = '-20px';
                heartSpan.style.left = Math.random() * window.innerWidth + 'px';
                heartSpan.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
                heartSpan.style.pointerEvents = 'none';
                heartSpan.style.zIndex = '25';
                heartSpan.style.filter = 'drop-shadow(0 0 6px #ff99aa)';
                heartSpan.style.animation = 'floatUpHeart 5s ease-in forwards';
                heartSpan.innerHTML = ['❤️', '💖', '💗', '💘', '💝', '🧡', '💕', '💞', '❤️‍🔥'][Math.floor(Math.random() * 9)];
                document.body.appendChild(heartSpan);
                heartSpan.addEventListener('animationend', () => heartSpan.remove());
            }, 1800);
        }
        
        function addClickBreezeEffect(e) {
            // 如果点击的是模态框或者其内部，不触发额外粒子（避免干扰），但无伤大雅
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            if(!x && !y) return;
            for(let i=0; i<5; i++) {
                const extraParticle = document.createElement('div');
                extraParticle.style.position = 'fixed';
                extraParticle.style.left = x + (Math.random() - 0.5) * 30 + 'px';
                extraParticle.style.top = y + (Math.random() - 0.5) * 30 + 'px';
                extraParticle.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
                extraParticle.style.pointerEvents = 'none';
                extraParticle.style.zIndex = '999';
                extraParticle.style.opacity = '0.9';
                extraParticle.style.animation = 'clickPopFade 0.9s forwards';
                const icons = ['💨', '❄️', '🍃', '❤️', '💖', '🌀', '🎐', '🌸'];
                extraParticle.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                document.body.appendChild(extraParticle);
                extraParticle.addEventListener('animationend', () => extraParticle.remove());
            }
        }
        
        function enhanceCloudMotion() {
            document.querySelectorAll('.cloud-line').forEach(line => line.style.display = 'block');
        }
        
        function initFanSwing() {
            const fanIcon = document.querySelector('.fan-icon');
            if(fanIcon) {
                setInterval(() => { fanIcon.style.transform = `rotate(${Math.sin(Date.now() / 500) * 12}deg)`; }, 100);
            }
        }
        
        function initialBreeze() {
            for(let i=0;i<16;i++) setTimeout(() => createWindParticle(), i*130);
        }
        
        startCoolBreeze();
        createBgClouds();
        createFloatingHearts();
        enhanceCloudMotion();
        initFanSwing();
        initialBreeze();
        window.addEventListener('click', addClickBreezeEffect);
        window.addEventListener('touchstart', addClickBreezeEffect);
        window.addEventListener('beforeunload', () => { if(particleInterval) clearInterval(particleInterval); });
        
        // ========= 泰迪熊模块: 交互 (单击看视频 / 双击换动作) =========
        const teddyCanvas = document.getElementById('teddyCanvas');
        const ctx = teddyCanvas.getContext('2d');
        let currentAction = 'sitting';   // 'sitting', 'lying', 'walking'
        let walkPhase = 0;
        let walkAnimationId = null;
        const w = 150, h = 150;
        
        // ---- 绘图函数 (坐立/躺卧/走动) 完整保留 ----
        function drawSitting() {
            ctx.save();
            ctx.clearRect(0, 0, w, h);
            const gradBody = ctx.createLinearGradient(60, 70, 90, 110);
            gradBody.addColorStop(0, '#F7C56E');
            gradBody.addColorStop(1, '#E5A649');
            ctx.beginPath();
            ctx.ellipse(75, 95, 35, 40, 0, 0, Math.PI * 2);
            ctx.fillStyle = gradBody;
            ctx.fill();
            ctx.strokeStyle = '#B97F2E';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(75, 55, 28, 0, Math.PI * 2);
            ctx.fillStyle = '#F7C56E';
            ctx.fill();
            ctx.stroke();
            ctx.beginPath(); ctx.ellipse(52, 35, 12, 14, -0.2, 0, Math.PI * 2); ctx.fillStyle = '#E5A649'; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(98, 35, 12, 14, 0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#B87C2E';
            ctx.beginPath(); ctx.arc(52, 35, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(98, 35, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#422C14';
            ctx.beginPath(); ctx.arc(65, 52, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(85, 52, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(75, 63, 6, 0, Math.PI); ctx.fillStyle = '#E59A5E'; ctx.fill();
            ctx.fillStyle = '#422C14';
            ctx.beginPath(); ctx.ellipse(75, 61, 2, 3, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(75, 90, 20, 22, 0, 0, Math.PI * 2); ctx.fillStyle = '#FFDEA5'; ctx.fill();
            ctx.fillStyle = '#E5A649';
            ctx.beginPath(); ctx.ellipse(58, 120, 12, 15, -0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(92, 120, 12, 15, 0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(45, 88, 10, 18, -0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(105, 88, 10, 18, 0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#FFAA88';
            ctx.globalAlpha = 0.5;
            ctx.beginPath(); ctx.arc(58, 60, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(92, 60, 5, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();
        }
        
        function drawLying() {
            ctx.clearRect(0, 0, w, h);
            ctx.save();
            ctx.translate(75, 95);
            ctx.rotate(-0.5);
            ctx.beginPath();
            ctx.ellipse(0, 0, 42, 32, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#F7C56E';
            ctx.fill();
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(38, -8, 26, 0, Math.PI * 2);
            ctx.fillStyle = '#F7C56E';
            ctx.fill();
            ctx.stroke();
            ctx.beginPath(); ctx.ellipse(48, -28, 10, 12, -0.3, 0, Math.PI * 2); ctx.fillStyle = '#E5A649'; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(30, -28, 10, 12, 0.3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#B87C2E';
            ctx.beginPath(); ctx.arc(48, -28, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(30, -28, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#422C14';
            ctx.beginPath(); ctx.arc(48, -10, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(30, -10, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(39, -2, 6, 3, 0, 0, Math.PI * 2); ctx.fillStyle = '#E59A5E'; ctx.fill();
            ctx.fillStyle = '#E5A649';
            ctx.beginPath(); ctx.ellipse(-25, 10, 12, 18, 0.4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(25, 12, 12, 18, -0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(-20, -20, 10, 15, 0.6, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(20, -22, 10, 15, -0.6, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.restore();
        }
        
        function drawWalking(phase) {
            ctx.clearRect(0, 0, w, h);
            ctx.save();
            const bobY = Math.sin(phase * Math.PI * 2) * 2;
            ctx.beginPath();
            ctx.ellipse(75, 85 + bobY, 34, 38, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#F7C56E';
            ctx.fill();
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(75, 48 + bobY*0.5, 27, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = '#E5A649';
            ctx.beginPath(); ctx.ellipse(53, 28 + bobY*0.3, 11, 13, -0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(97, 28 + bobY*0.3, 11, 13, 0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#B87C2E';
            ctx.beginPath(); ctx.arc(53, 28 + bobY*0.3, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(97, 28 + bobY*0.3, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#422C14';
            ctx.beginPath(); ctx.arc(64, 46 + bobY*0.4, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(86, 46 + bobY*0.4, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(62, 44 + bobY*0.4, 1, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(84, 44 + bobY*0.4, 1, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#422C14';
            ctx.beginPath(); ctx.ellipse(75, 57 + bobY*0.5, 5, 3, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(75, 85 + bobY, 18, 20, 0, 0, Math.PI*2); ctx.fillStyle = '#FFDEA5'; ctx.fill();
            const armSwing = Math.sin(phase * Math.PI * 2) * 0.6;
            ctx.fillStyle = '#E5A649';
            ctx.beginPath(); ctx.ellipse(48 + armSwing*3, 80 + bobY + armSwing, 10, 18, -0.8 + armSwing*0.5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(102 - armSwing*3, 80 + bobY - armSwing, 10, 18, 0.8 - armSwing*0.5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            const legOffset = Math.sin(phase * Math.PI * 2) * 12;
            ctx.beginPath(); ctx.ellipse(58 + legOffset*0.6, 118 + bobY - Math.abs(legOffset)*0.3, 12, 17, -0.4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(92 - legOffset*0.6, 118 + bobY - Math.abs(legOffset)*0.3, 12, 17, 0.4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#FFAA88';
            ctx.globalAlpha = 0.5;
            ctx.beginPath(); ctx.arc(58, 55 + bobY*0.4, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(92, 55 + bobY*0.4, 5, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();
        }
        
        function renderTeddy() {
            if (currentAction === 'sitting') drawSitting();
            else if (currentAction === 'lying') drawLying();
            else if (currentAction === 'walking') drawWalking(walkPhase);
        }
        
        function startWalkingAnimation() {
            if (walkAnimationId) cancelAnimationFrame(walkAnimationId);
            let startTime = null;
            function animateWalk(timestamp) {
                if (currentAction !== 'walking') {
                    if (walkAnimationId) cancelAnimationFrame(walkAnimationId);
                    walkAnimationId = null;
                    renderTeddy();
                    return;
                }
                if (!startTime) startTime = timestamp;
                const elapsed = (timestamp - startTime) / 1000;
                walkPhase = (elapsed * 1.8) % 1;
                renderTeddy();
                walkAnimationId = requestAnimationFrame(animateWalk);
            }
            walkAnimationId = requestAnimationFrame(animateWalk);
        }
        
        function stopWalkingAndRender() {
            if (walkAnimationId) { cancelAnimationFrame(walkAnimationId); walkAnimationId = null; }
            renderTeddy();
        }
        
        function nextAction() {
            const actions = ['sitting', 'lying', 'walking'];
            let idx = actions.indexOf(currentAction);
            idx = (idx + 1) % actions.length;
            currentAction = actions[idx];
            const tipDiv = document.getElementById('teddyTip');
            if (currentAction === 'sitting') tipDiv.innerHTML = '🐻 单击看视频 · 双击换动作 🧸坐立';
            else if (currentAction === 'lying') tipDiv.innerHTML = '🐻 单击看视频 · 双击换动作 🛌躺卧';
            else tipDiv.innerHTML = '🐻 单击看视频 · 双击换动作 🚶走走';
            if (currentAction === 'walking') {
                walkPhase = 0;
                startWalkingAnimation();
            } else {
                stopWalkingAndRender();
            }
        }
        
        // ---------- 视频模态框逻辑 ----------
        const modal = document.getElementById('videoModal');
        const videoEl = document.getElementById('loveVideo');
        const closeBtn = document.getElementById('closeModalBtn');
        
        function openVideoModal() {
            modal.classList.add('active');
            // 尝试播放（由于用户刚刚点击了熊，属于用户交互，可以自动播放带声音，但为了兼容性保留muted+controls）
            videoEl.muted = false;  // 取消静音，让用户有声音体验（如果浏览器策略允许）
            videoEl.play().catch(e => {
                // 如果自动播放被阻止，让用户手动点击播放即可，不影响体验
                console.log("自动播放需用户交互", e);
            });
        }
        
        function closeVideoModal() {
            modal.classList.remove('active');
            videoEl.pause();
            // 可选重置视频到开头
            videoEl.currentTime = 0;
        }
        
        // 单击熊 -> 打开视频模态框（新页面中间区域）
        // 双击熊 -> 切换动作
        let clickTimer = null;
        const teddyContainer = document.getElementById('teddyContainer');
        teddyContainer.addEventListener('click', (e) => {
            e.stopPropagation();
            if (clickTimer) {
                clearTimeout(clickTimer);
                clickTimer = null;
                // 双击：切换动作
                nextAction();
            } else {
                clickTimer = setTimeout(() => {
                    // 单击：打开视频
                    openVideoModal();
                    clickTimer = null;
                }, 180);
            }
        });
        
        // 关闭模态框事件
        closeBtn.addEventListener('click', closeVideoModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeVideoModal();
        });
        // 防止熊的事件冒泡干扰
        window.addEventListener('resize', () => { renderTeddy(); });
        
        // 初始化熊姿态
        renderTeddy();
        // 额外添加鼠标悬浮特效
        teddyContainer.addEventListener('mouseenter', () => {
            teddyContainer.style.transform = 'scale(1.03)';
            setTimeout(() => { if(teddyContainer) teddyContainer.style.transform = ''; }, 200);
        });
    })();
</script>
</body>
</html>
