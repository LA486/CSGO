<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>熊国会 · 六一儿童节快乐 · 糖果乐园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fde8cd 0%, #fff0db 35%, #c4e0fa 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, 'Poppins', 'Comic Neue', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* 主卡片 */
        .love-card {
            max-width: 950px;
            width: 100%;
            background: rgba(255, 250, 240, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 80px 80px 80px 60px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 215, 175, 0.8) inset, 0 8px 20px rgba(255, 105, 180, 0.2);
            padding: 2rem 1.8rem;
            text-align: center;
            z-index: 15;
            transition: transform 0.2s ease;
            animation: gentleFloat 4s infinite ease-in-out;
        }

        .love-card:hover {
            transform: scale(1.01);
        }

        .breeze-text {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffaa44, #ff6b8b, #66ccff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .festival-badge {
            display: inline-block;
            background: rgba(255, 220, 150, 0.8);
            border-radius: 60px;
            padding: 0.2rem 1rem;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
            color: #d2691e;
            backdrop-filter: blur(4px);
        }

        .cloud-section {
            background: rgba(255, 255, 245, 0.5);
            border-radius: 80px;
            padding: 1.2rem 1rem;
            margin: 1.5rem 0;
            backdrop-filter: blur(4px);
            text-align: center;
        }

        .cloud-art {
            display: inline-block;
            text-align: left;
            background: rgba(255, 245, 235, 0.4);
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
        }

        .cloud-line {
            font-family: monospace, 'Segoe UI Emoji', 'Courier New', monospace;
            font-size: 1.5rem;
            white-space: pre;
            line-height: 1.65;
            filter: drop-shadow(2px 4px 8px rgba(0, 0, 0, 0.1));
            animation: floatCloud 3s infinite alternate ease-in-out;
            display: block;
        }

        .cloud-line:nth-child(1) { animation-duration: 2.8s; }
        .cloud-line:nth-child(2) { animation-duration: 3.4s; animation-delay: 0.2s; }
        .cloud-line:nth-child(3) { animation-duration: 2.5s; animation-delay: 0.5s; }
        .cloud-line:nth-child(4) { animation-duration: 3.2s; animation-delay: 0.1s; }

        .cool-breeze {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin: 1rem 0 0.8rem;
        }

        .cool-item {
            font-size: 1.8rem;
            display: inline-block;
            animation: spinFlurry 1.8s infinite alternate, floatUpSmall 2.2s infinite alternate;
        }

        .blessing {
            font-size: 1.9rem;
            font-weight: bold;
            background: linear-gradient(120deg, #ff9966, #ff5e7e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 1rem 0 0.5rem;
            letter-spacing: 2px;
        }

        .blessing-dual {
            font-size: 1.7rem;
            margin-top: 0.8rem;
            padding: 0.6rem;
            border-top: 2px dashed #ffb387;
            border-bottom: 2px dashed #ffb387;
            display: inline-block;
            background: rgba(255, 200, 180, 0.3);
            border-radius: 60px;
        }

        /* 想念按钮区域 */
        .miss-you-area {
            margin: 1.5rem 0 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .heart-miss-btn {
            background: radial-gradient(circle at 30% 30%, #ff7b9c, #e6456b);
            border: none;
            width: 85px;
            height: 85px;
            border-radius: 50% 50% 50% 50%;
            position: relative;
            cursor: pointer;
            box-shadow: 0 15px 25px rgba(220, 20, 60, 0.4), 0 0 0 4px rgba(255, 240, 245, 0.9);
            transition: all 0.25s ease;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            margin-bottom: 0.5rem;
            animation: heartBeatPulse 1.8s infinite;
        }

        .heart-miss-btn::before {
            content: "";
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: transparent;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 200, 0.7);
            animation: rotateDash 10s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateDash {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .heart-miss-btn:hover {
            transform: scale(1.12);
            background: radial-gradient(circle at 30% 30%, #ff99b9, #f0627c);
            box-shadow: 0 0 30px #ff4d7a, 0 0 0 5px rgba(255, 220, 220, 0.9);
        }

        .heart-miss-btn:active { transform: scale(0.95); }

        @keyframes heartBeatPulse {
            0% { transform: scale(1); }
            30% { transform: scale(1.05); }
            50% { transform: scale(1.02); }
            70% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .miss-counter-box {
            background: rgba(255, 255, 250, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 0.6rem 1.4rem;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #b13e4b;
            box-shadow: 0 6px 14px rgba(255, 140, 140, 0.3);
            margin-top: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .miss-count {
            background: #ffe8f0;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            color: #c0395c;
            font-size: 1.4rem;
            min-width: 50px;
        }

        .last-time {
            color: #7b4b3a;
            font-size: 0.9rem;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-badge {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            background: #fff2e6;
            border-radius: 30px;
            padding: 0.2rem 1.2rem;
            color: #9b5e4b;
        }

        .global-badge {
            display: inline-block;
            background: rgba(255, 200, 100, 0.3);
            border-radius: 20px;
            padding: 0.15rem 0.8rem;
            font-size: 0.75rem;
            color: #b8782e;
            margin-left: 8px;
            animation: gentleFloat 2s infinite ease-in-out;
        }

        /* 游戏按钮 */
        .game-btn {
            background: linear-gradient(135deg, #ffaa66, #ff6b8b);
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 1.2rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
            transition: all 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .game-btn:hover {
            transform: scale(1.03);
            background: linear-gradient(135deg, #ffbb77, #ff7f9f);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.25);
        }

        /* 动画 */
        @keyframes floatCloud {
            0% { transform: translateX(0px) translateY(0px) rotate(0deg); }
            100% { transform: translateX(8px) translateY(-5px) rotate(0.8deg); }
        }
        @keyframes gentleFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-6px); }
        }
        @keyframes spinFlurry {
            0% { transform: rotate(0deg) scale(0.9); opacity: 0.7; }
            100% { transform: rotate(12deg) scale(1.2); opacity: 1; }
        }
        @keyframes floatUpSmall {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }

        .floating-particle {
            position: fixed;
            pointer-events: none;
            z-index: 20;
            font-size: 1.4rem;
            animation: blowWind 6s linear forwards;
            filter: drop-shadow(0 0 4px gold);
        }
        @keyframes blowWind {
            0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateX(180px) translateY(-120px) rotate(360deg); opacity: 0; }
        }

        .bg-cloud {
            position: fixed;
            background: rgba(255, 255, 250, 0.7);
            border-radius: 1000px;
            filter: blur(20px);
            z-index: 0;
            pointer-events: none;
            animation: bgCloudMove 20s infinite alternate;
        }
        @keyframes bgCloudMove {
            0% { transform: translateX(-3%) translateY(0%); }
            100% { transform: translateX(5%) translateY(-8%); }
        }

        .fan-icon {
            display: inline-block;
            animation: fanSwing 2s infinite ease;
            font-size: 1.9rem;
            margin-right: 6px;
        }
        @keyframes fanSwing {
            0% { transform: rotate(-15deg); }
            100% { transform: rotate(15deg); }
        }

        @keyframes clickPopFade {
            0% { transform: scale(0.3) translateY(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-40px); opacity: 0; }
        }
        @keyframes floatUpHeart {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(-120vh) rotate(25deg); opacity: 0; }
        }

        /* 响应式 */
        @media (max-width: 620px) {
            .love-card { padding: 1.2rem; }
            .cloud-line { font-size: 0.95rem; white-space: pre-wrap; }
            .breeze-text { font-size: 1.6rem; }
            .blessing { font-size: 1.4rem; }
            .game-btn { font-size: 1rem; padding: 0.5rem 1.2rem; }
            .heart-miss-btn { width: 70px; height: 70px; font-size: 2rem; }
        }

        /* 🐶 实况小狗容器 (右下角) */
        .dog-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .dog-container:active { transform: scale(0.94); }

        .dog-video {
            width: auto;
            height: auto;
            max-width: 150px;
            max-height: 150px;
            border-radius: 25px;
            object-fit: contain;
            background: rgba(255, 245, 220, 0.35);
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border: 3px solid rgba(255, 215, 175, 0.6);
            padding: 2px;
            transition: transform 0.3s ease;
        }

        .dog-video.dog-spin {
            animation: dogSpin 0.6s ease-in-out forwards;
        }

        @keyframes dogSpin {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(360deg) scale(1.1); }
        }

        .dog-tip {
            background: rgba(255, 255, 210, 0.85);
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #b45f2b;
            white-space: nowrap;
            animation: tipPulse 1.2s infinite alternate;
        }
        @keyframes tipPulse {
            0% { opacity: 0.7; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); }
        }
        @media (max-width: 550px) {
            .dog-video { max-width: 120px; max-height: 120px; border-radius: 20px; }
            .dog-tip { font-size: 0.7rem; }
        }

        /* 视频模态框 */
        .video-modal, .game-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .video-modal.active, .game-modal.active { display: flex; }
        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            background: #1e1a1a;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 2px solid #ffcd94;
            text-align: center;
        }
        .modal-content video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 24px;
        }
        .close-modal {
            position: absolute;
            top: 8px; right: 18px;
            font-size: 2rem;
            color: #ffcf9a;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .close-modal:hover { background: #ff8866; color: white; }
        .video-caption { margin-top: 12px; color: #ffecb3; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 游戏专属样式 */
        .game-container {
            background: #fff6e8;
            border-radius: 48px;
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: bold;
            color: #d96c1e;
            background: #ffefcf;
            padding: 8px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
        }
        .game-canvas {
            background: #fdf3e0;
            border-radius: 40px;
            box-shadow: inset 0 0 0 3px #ffd8a5, 0 10px 20px rgba(0, 0, 0, 0.2);
            display: block;
            margin: 0 auto;
            cursor: pointer;
            width: 100%;
            height: auto;
            max-width: 450px;
        }
        .game-message {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #aa5e1e;
            min-height: 2rem;
        }
        .restart-btn {
            background: #ff9f4a;
            border: none;
            color: white;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 1rem;
            margin-top: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .restart-btn:hover { background: #ff7a2a; }
    </style>
</head>
<body>

    <div class="love-card">
        <div class="festival-badge">🎈 6·1 儿童节特别版 🎈</div>
        <div class="breeze-text">
            <span class="fan-icon">🍭</span> 熊国会小朋友，儿童节快乐！ <span class="fan-icon">🎈</span>
        </div>
        <div class="cloud-section">
            <div class="cloud-art">
                <div class="cloud-line">╭◜◝ ͡ ◜◝╮</div>
                <div class="cloud-line">(　　　`3´ )༄༅༄༅</div>
                <div class="cloud-line">╰◟◞ ͜ ◟◞╯　　༄༅༄༅ 🧸🍬🍭</div>
                <div class="cloud-line">༄༅ 🎁 🎈 🎀</div>
            </div>
        </div>
        <div class="cool-breeze">
            <span class="cool-item">🍬</span><span class="cool-item">🍭</span><span class="cool-item">🎈</span><span class="cool-item">🧸</span><span class="cool-item">✨</span>
        </div>
        <div class="blessing">🎉 祝熊国会儿童节快乐！童心永驻，可爱无敌 🎉</div>
        <div class="blessing blessing-dual">🎉 小熊陪你每一天，快乐成长 ۶•͈⚇•͈ა 🎉</div>

        <div class="miss-you-area">
            <button class="heart-miss-btn" id="missYouHeartBtn">❤️</button>
            <div class="miss-counter-box">
                <span>💌 想念次数</span>
                <span class="miss-count" id="missCountDisplay">…</span>
                <span class="last-time" id="lastClickTimeDisplay">加载中…</span>
                <span class="global-badge" id="globalBadge">🌐 全球统一</span>
            </div>
            <div class="history-badge" id="historyHint">✨ 每次想念都被珍藏 ✨</div>
        </div>

        <div style="margin-top: 1rem; font-size:1rem; color:#b45f3b;">🎀 愿你永远像孩子一样，被世界温柔以待 🎀</div>
        <button class="game-btn" id="openGameBtn">🎮 糖果大作战 · 戳我玩 🍬</button>
    </div>

    <div id="bgCloudContainer"></div>

    <div class="dog-container" id="dogContainer">
        <video id="dogVideo" class="dog-video" autoplay loop muted playsinline>
            <source src="dog_live.mp4" type="video/mp4">
            <img src="dog.jpg" alt="小狗">
        </video>
        <div class="dog-tip" id="dogTip">🐶 单击看视频 · 双击转圈圈</div>
    </div>

    <div id="videoModal" class="video-modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModalBtn">&times;</span>
            <video id="loveVideo" controls autoplay muted playsinline>
                <source src="61.mp4" type="video/mp4">
            </video>
            <div class="video-caption">🎁 专属你的儿童节小电影 🎁</div>
        </div>
    </div>

    <div id="gameModal" class="game-modal">
        <div class="modal-content" style="background: transparent; border: none; box-shadow: none; padding: 0;">
            <div class="game-container">
                <div class="game-header">
                    <span>🍬 糖果收集者 🍬</span>
                    <span>⏱️ <span id="timerDisplay">15</span>s</span>
                    <span>🍭 <span id="scoreDisplay">0</span></span>
                </div>
                <canvas id="gameCanvas" class="game-canvas" width="450" height="450"></canvas>
                <div class="game-message" id="gameMessage">点击糖果，越快越多！</div>
                <button class="restart-btn" id="restartGameBtn">✨ 再玩一次 ✨</button>
                <span class="close-modal" id="closeGameBtn" style="position: static; margin-top: 12px; background: #ffaa77; color: #5c2e0e; display: inline-block; width: auto; padding: 6px 20px; border-radius: 60px; font-size: 0.9rem;">关闭游戏</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const bodyEl = document.body;
            let particleInterval = null;
            const coolItems = ['🍬', '🍭', '🎈', '🧸', '🎀', '✨', '🍬', '🍭', '💖', '🎁'];

            function createWindParticle() {
                const particle = document.createElement('div');
                particle.classList.add('floating-particle');
                particle.innerHTML = coolItems[Math.floor(Math.random() * coolItems.length)];
                particle.style.fontSize = `${1 + Math.random() * 1.2}rem`;
                particle.style.left = Math.random() * window.innerWidth + 'px';
                particle.style.top = window.innerHeight + 20 + 'px';
                particle.style.animation = `blowWind ${4 + Math.random() * 3}s linear forwards`;
                bodyEl.appendChild(particle);
                particle.addEventListener('animationend', () => particle.remove());
            }

            function startCoolBreeze() {
                if (particleInterval) clearInterval(particleInterval);
                particleInterval = setInterval(() => {
                    if (document.hidden) return;
                    for (let i = 0; i < (Math.random() * 2 + 1); i++) createWindParticle();
                }, 600);
            }

            function createBgClouds() {
                const container = document.getElementById('bgCloudContainer');
                if (!container) return;
                container.innerHTML = '';
                for (let i = 0; i < 6; i++) {
                    const cloud = document.createElement('div');
                    cloud.classList.add('bg-cloud');
                    cloud.style.width = 200 + Math.random() * 350 + 'px';
                    cloud.style.height = 100 + Math.random() * 180 + 'px';
                    cloud.style.left = Math.random() * 80 + '%';
                    cloud.style.top = Math.random() * 80 + '%';
                    cloud.style.opacity = 0.3 + Math.random() * 0.3;
                    container.appendChild(cloud);
                }
            }

            function createFloatingHearts() {
                setInterval(() => {
                    if (document.hidden) return;
                    const heartSpan = document.createElement('div');
                    heartSpan.style.position = 'fixed';
                    heartSpan.style.bottom = '-20px';
                    heartSpan.style.left = Math.random() * window.innerWidth + 'px';
                    heartSpan.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
                    heartSpan.style.pointerEvents = 'none';
                    heartSpan.style.zIndex = '25';
                    heartSpan.style.animation = 'floatUpHeart 5s ease-in forwards';
                    heartSpan.innerHTML = ['❤️', '💖', '🧡', '💛', '💚', '🎈', '🍭'][Math.floor(Math.random() * 7)];
                    document.body.appendChild(heartSpan);
                    heartSpan.addEventListener('animationend', () => heartSpan.remove());
                }, 1500);
            }

            function addClickBreezeEffect(e) {
                if (e.target.closest('.game-modal') || e.target.closest('.video-modal')) return;
                const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                if (!x && !y) return;
                for (let i = 0; i < 4; i++) {
                    const p = document.createElement('div');
                    p.style.position = 'fixed';
                    p.style.left = x + (Math.random() - 0.5) * 30 + 'px';
                    p.style.top = y + (Math.random() - 0.5) * 30 + 'px';
                    p.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
                    p.style.pointerEvents = 'none';
                    p.style.zIndex = '999';
                    p.style.animation = 'clickPopFade 0.9s forwards';
                    p.innerHTML = ['🍬', '🍭', '🎈', '❤️'][Math.floor(Math.random() * 4)];
                    document.body.appendChild(p);
                    p.addEventListener('animationend', () => p.remove());
                }
            }

            startCoolBreeze(); createBgClouds(); createFloatingHearts();
            window.addEventListener('click', addClickBreezeEffect);
            window.addEventListener('beforeunload', () => particleInterval && clearInterval(particleInterval));

            // 想念计数器
            const missBtn = document.getElementById('missYouHeartBtn');
            const missCountSpan = document.getElementById('missCountDisplay');
            const lastTimeSpan = document.getElementById('lastClickTimeDisplay');
            const historyHint = document.getElementById('historyHint');
            const globalBadge = document.getElementById('globalBadge');
            const API_NAMESPACE = 'xgh61miss';
            const API_BASE = 'https://api.countapi.xyz';
            let globalCount = 0, globalLastTime = null, apiAvailable = false;

            function fetchWithTimeout(url, timeout = 4000) {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                return fetch(url, { signal: controller.signal }).then(r => { clearTimeout(id); return r.json(); }).catch(e => { clearTimeout(id); throw e; });
            }

            async function updateCountDisplay() {
                missCountSpan.textContent = globalCount;
                lastTimeSpan.textContent = globalLastTime ? '🕒 ' + new Date(globalLastTime).toLocaleString() : '还没按过呢';
                historyHint.innerHTML = globalCount > 0 ? `💗 全世界已经想念了 ${globalCount} 次 💗` : '✨ 每次想念都被珍藏 ✨';
                globalBadge.textContent = apiAvailable ? '🌐 全球同步' : '📱 本地模式';
            }

            async function loadGlobalCount() {
                try {
                    const data = await fetchWithTimeout(`${API_BASE}/get/${API_NAMESPACE}/counter`);
                    globalCount = data.value; apiAvailable = true;
                } catch (e) { apiAvailable = false; }
                try {
                    const t = await fetchWithTimeout(`${API_BASE}/get/${API_NAMESPACE}/lasttime`);
                    globalLastTime = t.value;
                } catch (e) {}
                updateCountDisplay();
            }

            missBtn.addEventListener('click', async (e) => {
                globalCount++; globalLastTime = Date.now();
                updateCountDisplay();
                try { await fetchWithTimeout(`${API_BASE}/hit/${API_NAMESPACE}/counter`); } catch(e){}
                try { await fetchWithTimeout(`${API_BASE}/set/${API_NAMESPACE}/lasttime?value=${globalLastTime}`); } catch(e){}
                const rect = missBtn.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                for (let i=0;i<8;i++) {
                    const h = document.createElement('div');
                    h.innerHTML = ['💖','❤️','💕','💗','💘','💝','✨','🌸'][i%8];
                    h.style.cssText = `position:fixed; left:${centerX+(Math.random()-0.5)*30}px; top:${centerY+(Math.random()-0.5)*20}px; font-size:1.5rem; pointer-events:none; z-index:999; animation:clickPopFade 0.8s forwards;`;
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 800);
                }
            });

            loadGlobalCount();

            // 小狗视频
            const dogVideo = document.getElementById('dogVideo');
            const dogTip = document.getElementById('dogTip');
            const modalVideo = document.getElementById('videoModal');
            const videoEl = document.getElementById('loveVideo');
            document.getElementById('closeModalBtn').addEventListener('click', () => { modalVideo.classList.remove('active'); videoEl.pause(); });
            modalVideo.addEventListener('click', e => { if(e.target === modalVideo) { modalVideo.classList.remove('active'); videoEl.pause(); } });

            let clickTimer = null;
            document.getElementById('dogContainer').addEventListener('click', e => {
                e.stopPropagation();
                if (clickTimer) {
                    clearTimeout(clickTimer); clickTimer = null;
                    dogVideo.classList.add('dog-spin');
                    dogTip.textContent = '🌀 转圈圈啦！';
                    setTimeout(() => { dogVideo.classList.remove('dog-spin'); dogTip.textContent = '🐶 单击看视频 · 双击转圈圈'; }, 600);
                } else {
                    clickTimer = setTimeout(() => {
                        modalVideo.classList.add('active');
                        videoEl.muted = false; videoEl.play().catch(()=>{});
                        clickTimer = null;
                    }, 180);
                }
            });

            // ========= 糖果大作战游戏 (自适应+土味情话) =========
            const gameModal = document.getElementById('gameModal');
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const timerSpan = document.getElementById('timerDisplay');
            const scoreSpan = document.getElementById('scoreDisplay');
            const gameMessageDiv = document.getElementById('gameMessage');
            const restartBtn = document.getElementById('restartGameBtn');
            const closeGameBtn = document.getElementById('closeGameBtn');

            let gameActive = false;
            let score = 0;
            let timeLeft = 15;
            let intervalId = null;
            let animationId = null;
            let candies = [];
            const CANDY_COUNT = 6;
            const RADIUS = 20;
            let loveMsgTimer = null; // 土味情话定时器

            // 土味情话库
            const loveQuotes = [
                "近朱者赤，近你者甜。",
                "不要抱怨，抱我。",
                "最近有谣言说我喜欢你，我要澄清一下，那不是谣言。",
                "你知道我的缺点是什么吗？是缺点你。",
                "我想买一块地，你的死心塌地。",
                "你累不累？你在我心里跑了一天了。",
                "这是我的手背，这是我的脚背，你是我的宝贝。",
                "我觉得你特别像一款游戏，我的世界。",
                "只许州官放火，不许你离开我。",
                "你近视吗？不近视为什么看不出来我喜欢你。",
                "你有没有闻到什么烧焦的味道？那是我的心在燃烧。",
                "我想吃碗面，你的心里面。",
                "甜有100种方式，吃糖，蛋糕，还有每天98次的想你。",
                "只许州官放火，不许你离开我。",
                "你的名字，是我见过最短的情诗。"
            ];

            function initCandies() {
                candies = [];
                for (let i = 0; i < CANDY_COUNT; i++) {
                    candies.push({
                        x: 40 + Math.random() * (canvas.width - 80),
                        y: 40 + Math.random() * (canvas.height - 80),
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2
                    });
                }
            }

            function drawCandies() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fdf3e0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                for (let c of candies) {
                    ctx.save();
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = "rgba(0,0,0,0.2)";
                    ctx.font = `${RADIUS*1.5}px "Segoe UI Emoji"`;
                    ctx.fillStyle = '#ffaa66';
                    ctx.beginPath();
                    ctx.arc(c.x, c.y, RADIUS - 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#d45a1a';
                    ctx.font = `${RADIUS*1.4}px "Segoe UI Emoji"`;
                    ctx.fillText('🍬', c.x - 12, c.y + 10);
                    ctx.restore();
                }
            }

            function updateCandies() {
                if (!gameActive) return;
                for (let c of candies) {
                    c.x += c.vx;
                    c.y += c.vy;
                    if (c.x - RADIUS < 0) { c.x = RADIUS; c.vx = -c.vx; }
                    if (c.x + RADIUS > canvas.width) { c.x = canvas.width - RADIUS; c.vx = -c.vx; }
                    if (c.y - RADIUS < 0) { c.y = RADIUS; c.vy = -c.vy; }
                    if (c.y + RADIUS > canvas.height) { c.y = canvas.height - RADIUS; c.vy = -c.vy; }
                }
                drawCandies();
                animationId = requestAnimationFrame(updateCandies);
            }

            function handleCanvasClick(e) {
                if (!gameActive) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;   // 原始宽度 / 实际显示宽度
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                const canvasX = (clientX - rect.left) * scaleX;
                const canvasY = (clientY - rect.top) * scaleY;
                for (let i = 0; i < candies.length; i++) {
                    const c = candies[i];
                    const dx = canvasX - c.x;
                    const dy = canvasY - c.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < RADIUS) {
                        score++;
                        scoreSpan.innerText = score;
                        c.x = 40 + Math.random() * (canvas.width - 80);
                        c.y = 40 + Math.random() * (canvas.height - 80);
                        c.vx = (Math.random() - 0.5) * 2.5;
                        c.vy = (Math.random() - 0.5) * 2.5;
                        
                        // 显示随机土味情话
                        const randomLove = loveQuotes[Math.floor(Math.random() * loveQuotes.length)];
                        gameMessageDiv.innerHTML = randomLove;
                        clearTimeout(loveMsgTimer);
                        loveMsgTimer = setTimeout(() => {
                            if (gameActive) gameMessageDiv.innerHTML = '继续点糖果！';
                        }, 3000);
                        break;
                    }
                }
            }

            function startGame() {
                if (intervalId) clearInterval(intervalId);
                if (animationId) cancelAnimationFrame(animationId);
                if (loveMsgTimer) clearTimeout(loveMsgTimer);
                gameActive = true;
                score = 0;
                timeLeft = 15;
                scoreSpan.innerText = '0';
                timerSpan.innerText = '15';
                gameMessageDiv.innerHTML = '快戳糖果！🍬';
                initCandies();
                drawCandies();
                updateCandies();
                intervalId = setInterval(() => {
                    if (!gameActive) return;
                    timeLeft--;
                    timerSpan.innerText = timeLeft;
                    if (timeLeft <= 0) {
                        gameActive = false;
                        clearInterval(intervalId);
                        if (animationId) cancelAnimationFrame(animationId);
                        gameMessageDiv.innerHTML = `⏰ 时间到啦！你收集了 ${score} 颗糖果！ 🎁`;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#fdf3e0';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.font = 'bold 24px "Segoe UI"';
                        ctx.fillStyle = '#d96c1e';
                        ctx.fillText('🎉 GAME OVER 🎉', canvas.width / 2 - 100, canvas.height / 2);
                    }
                }, 1000);
            }

            function stopGameAndClose() {
                gameActive = false;
                if (intervalId) clearInterval(intervalId);
                if (animationId) cancelAnimationFrame(animationId);
                if (loveMsgTimer) clearTimeout(loveMsgTimer);
                gameModal.classList.remove('active');
            }

            document.getElementById('openGameBtn').addEventListener('click', () => {
                if (gameModal.classList.contains('active')) return;
                startGame();
                gameModal.classList.add('active');
            });
            closeGameBtn.addEventListener('click', stopGameAndClose);
            restartBtn.addEventListener('click', () => {
                stopGameAndClose();
                setTimeout(() => {
                    startGame();
                    gameModal.classList.add('active');
                }, 100);
            });
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCanvasClick(e);
            });
            gameModal.addEventListener('click', (e) => {
                if (e.target === gameModal) stopGameAndClose();
            });
        })();
    </script>
</body>
</html>
