<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>熊国会 · 六一儿童节快乐 · 糖果乐园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fde8cd 0%, #fff0db 35%, #c4e0fa 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, 'Poppins', 'Comic Neue', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* 主卡片 */
        .love-card {
            max-width: 950px;
            width: 100%;
            background: rgba(255, 250, 240, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 80px 80px 80px 60px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 215, 175, 0.8) inset, 0 8px 20px rgba(255, 105, 180, 0.2);
            padding: 2rem 1.8rem;
            text-align: center;
            z-index: 15;
            transition: transform 0.2s ease;
            animation: gentleFloat 4s infinite ease-in-out;
        }

        .love-card:hover {
            transform: scale(1.01);
        }

        .breeze-text {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffaa44, #ff6b8b, #66ccff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .festival-badge {
            display: inline-block;
            background: rgba(255, 220, 150, 0.8);
            border-radius: 60px;
            padding: 0.2rem 1rem;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
            color: #d2691e;
            backdrop-filter: blur(4px);
        }

        .cloud-section {
            background: rgba(255, 255, 245, 0.5);
            border-radius: 80px;
            padding: 1.2rem 1rem;
            margin: 1.5rem 0;
            backdrop-filter: blur(4px);
            text-align: center;
        }

        .cloud-art {
            display: inline-block;
            text-align: left;
            background: rgba(255, 245, 235, 0.4);
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
        }

        .cloud-line {
            font-family: monospace, 'Segoe UI Emoji', 'Courier New', monospace;
            font-size: 1.5rem;
            white-space: pre;
            line-height: 1.65;
            filter: drop-shadow(2px 4px 8px rgba(0, 0, 0, 0.1));
            animation: floatCloud 3s infinite alternate ease-in-out;
            display: block;
        }

        .cloud-line:nth-child(1) {
            animation-duration: 2.8s;
        }
        .cloud-line:nth-child(2) {
            animation-duration: 3.4s;
            animation-delay: 0.2s;
        }
        .cloud-line:nth-child(3) {
            animation-duration: 2.5s;
            animation-delay: 0.5s;
        }
        .cloud-line:nth-child(4) {
            animation-duration: 3.2s;
            animation-delay: 0.1s;
        }

        .cool-breeze {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin: 1rem 0 0.8rem;
        }

        .cool-item {
            font-size: 1.8rem;
            display: inline-block;
            animation: spinFlurry 1.8s infinite alternate, floatUpSmall 2.2s infinite alternate;
        }

        .blessing {
            font-size: 1.9rem;
            font-weight: bold;
            background: linear-gradient(120deg, #ff9966, #ff5e7e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 1rem 0 0.5rem;
            letter-spacing: 2px;
        }

        .blessing-dual {
            font-size: 1.7rem;
            margin-top: 0.8rem;
            padding: 0.6rem;
            border-top: 2px dashed #ffb387;
            border-bottom: 2px dashed #ffb387;
            display: inline-block;
            background: rgba(255, 200, 180, 0.3);
            border-radius: 60px;
        }

        /* 想念按钮区域 */
        .miss-you-area {
            margin: 1.5rem 0 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .heart-miss-btn {
            background: radial-gradient(circle at 30% 30%, #ff7b9c, #e6456b);
            border: none;
            width: 85px;
            height: 85px;
            border-radius: 50% 50% 50% 50%;
            position: relative;
            cursor: pointer;
            box-shadow: 0 15px 25px rgba(220, 20, 60, 0.4), 0 0 0 4px rgba(255, 240, 245, 0.9);
            transition: all 0.25s ease;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            margin-bottom: 0.5rem;
            animation: heartBeatPulse 1.8s infinite;
        }

        .heart-miss-btn::before {
            content: "";
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: transparent;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 200, 0.7);
            animation: rotateDash 10s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateDash {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .heart-miss-btn:hover {
            transform: scale(1.12);
            background: radial-gradient(circle at 30% 30%, #ff99b9, #f0627c);
            box-shadow: 0 0 30px #ff4d7a, 0 0 0 5px rgba(255, 220, 220, 0.9);
        }

        .heart-miss-btn:active {
            transform: scale(0.95);
        }

        @keyframes heartBeatPulse {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.05);
            }
            50% {
                transform: scale(1.02);
            }
            70% {
                transform: scale(1.08);
            }
            100% {
                transform: scale(1);
            }
        }

        .miss-counter-box {
            background: rgba(255, 255, 250, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 0.6rem 1.4rem;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #b13e4b;
            box-shadow: 0 6px 14px rgba(255, 140, 140, 0.3);
            margin-top: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .miss-count {
            background: #ffe8f0;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            color: #c0395c;
            font-size: 1.4rem;
            min-width: 50px;
        }

        .last-time {
            color: #7b4b3a;
            font-size: 0.9rem;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-badge {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            background: #fff2e6;
            border-radius: 30px;
            padding: 0.2rem 1.2rem;
            color: #9b5e4b;
        }

        /* 全局计数提示 */
        .global-badge {
            display: inline-block;
            background: rgba(255, 200, 100, 0.3);
            border-radius: 20px;
            padding: 0.15rem 0.8rem;
            font-size: 0.75rem;
            color: #b8782e;
            margin-left: 8px;
            animation: gentleFloat 2s infinite ease-in-out;
        }

        /* 游戏按钮 */
        .game-btn {
            background: linear-gradient(135deg, #ffaa66, #ff6b8b);
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 1.2rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
            transition: all 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .game-btn:hover {
            transform: scale(1.03);
            background: linear-gradient(135deg, #ffbb77, #ff7f9f);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.25);
        }

        /* 动画 */
        @keyframes floatCloud {
            0% {
                transform: translateX(0px) translateY(0px) rotate(0deg);
            }
            100% {
                transform: translateX(8px) translateY(-5px) rotate(0.8deg);
            }
        }
        @keyframes gentleFloat {
            0% {
                transform: translateY(0px);
            }
            100% {
                transform: translateY(-6px);
            }
        }
        @keyframes spinFlurry {
            0% {
                transform: rotate(0deg) scale(0.9);
                opacity: 0.7;
            }
            100% {
                transform: rotate(12deg) scale(1.2);
                opacity: 1;
            }
        }
        @keyframes floatUpSmall {
            0% {
                transform: translateY(0px);
            }
            100% {
                transform: translateY(-8px);
            }
        }

        /* 吹风粒子 */
        .floating-particle {
            position: fixed;
            pointer-events: none;
            z-index: 20;
            font-size: 1.4rem;
            animation: blowWind 6s linear forwards;
            filter: drop-shadow(0 0 4px gold);
        }
        @keyframes blowWind {
            0% {
                transform: translateX(0) translateY(0) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateX(180px) translateY(-120px) rotate(360deg);
                opacity: 0;
            }
        }

        .bg-cloud {
            position: fixed;
            background: rgba(255, 255, 250, 0.7);
            border-radius: 1000px;
            filter: blur(20px);
            z-index: 0;
            pointer-events: none;
            animation: bgCloudMove 20s infinite alternate;
        }
        @keyframes bgCloudMove {
            0% {
                transform: translateX(-3%) translateY(0%);
            }
            100% {
                transform: translateX(5%) translateY(-8%);
            }
        }

        .fan-icon {
            display: inline-block;
            animation: fanSwing 2s infinite ease;
            font-size: 1.9rem;
            margin-right: 6px;
        }
        @keyframes fanSwing {
            0% {
                transform: rotate(-15deg);
            }
            100% {
                transform: rotate(15deg);
            }
        }

        @keyframes clickPopFade {
            0% {
                transform: scale(0.3) translateY(0);
                opacity: 1;
            }
            100% {
                transform: scale(1.5) translateY(-40px);
                opacity: 0;
            }
        }
        @keyframes floatUpHeart {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-120vh) rotate(25deg);
                opacity: 0;
            }
        }

        /* 响应式 */
        @media (max-width: 620px) {
            .love-card {
                padding: 1.2rem;
            }
            .cloud-line {
                font-size: 0.95rem;
                white-space: pre-wrap;
            }
            .breeze-text {
                font-size: 1.6rem;
            }
            .blessing {
                font-size: 1.4rem;
            }
            .game-btn {
                font-size: 1rem;
                padding: 0.5rem 1.2rem;
            }
            .heart-miss-btn {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
        }

        /* 小狗容器 (右下角) */
        .dog-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .dog-container:active {
            transform: scale(0.94);
        }

        .dog-image {
            width: 150px;
            height: 150px;
            border-radius: 25px;
            object-fit: contain;
            background: rgba(255, 245, 220, 0.35);
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, filter 0.3s ease, border-radius 0.3s ease;
            border: 3px solid rgba(255, 215, 175, 0.6);
            padding: 4px;
        }
        .dog-image.dog-spin {
            transform: rotate(360deg) scale(1.1);
        }
        .dog-image.dog-bounce {
            animation: dogBounce 0.5s ease;
        }
        @keyframes dogBounce {
            0% {
                transform: scale(1) rotate(0deg);
            }
            30% {
                transform: scale(1.2) rotate(-8deg);
            }
            60% {
                transform: scale(0.9) rotate(8deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }

        .dog-tip {
            background: rgba(255, 255, 210, 0.85);
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #b45f2b;
            white-space: nowrap;
            animation: tipPulse 1.2s infinite alternate;
        }
        @keyframes tipPulse {
            0% {
                opacity: 0.7;
                transform: scale(0.95);
            }
            100% {
                opacity: 1;
                transform: scale(1.05);
            }
        }
        @media (max-width: 550px) {
            .dog-image {
                width: 120px;
                height: 120px;
                border-radius: 20px;
            }
            .dog-tip {
                font-size: 0.7rem;
            }
        }

        /* 视频模态框 */
        .video-modal,
        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .video-modal.active,
        .game-modal.active {
            display: flex;
        }
        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            background: #1e1a1a;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 2px solid #ffcd94;
            text-align: center;
        }
        .modal-content video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 24px;
        }
        .close-modal {
            position: absolute;
            top: 8px;
            right: 18px;
            font-size: 2rem;
            color: #ffcf9a;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .close-modal:hover {
            background: #ff8866;
            color: white;
        }
        .video-caption {
            margin-top: 12px;
            color: #ffecb3;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 游戏专属样式 */
        .game-container {
            background: #fff6e8;
            border-radius: 48px;
            padding: 20px;
            text-align: center;
            width: 500px;
            max-width: 90vw;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            font-size: 1.6rem;
            font-weight: bold;
            color: #d96c1e;
            background: #ffefcf;
            padding: 8px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
        }
        .game-canvas {
            background: #fdf3e0;
            border-radius: 40px;
            box-shadow: inset 0 0 0 3px #ffd8a5, 0 10px 20px rgba(0, 0, 0, 0.2);
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .game-message {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #aa5e1e;
        }
        .restart-btn {
            background: #ff9f4a;
            border: none;
            color: white;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 1rem;
            margin-top: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .restart-btn:hover {
            background: #ff7a2a;
        }
    </style>
</head>
<body>

    <div class="love-card">
        <div class="festival-badge">🎈 6·1 儿童节特别版 🎈</div>
        <div class="breeze-text">
            <span class="fan-icon">🍭</span> 熊国会小朋友，儿童节快乐！ <span class="fan-icon">🎈</span>
        </div>
        <div class="cloud-section">
            <div class="cloud-art">
                <div class="cloud-line">╭◜◝ ͡ ◜◝╮</div>
                <div class="cloud-line">(　　　`3´ )༄༅༄༅</div>
                <div class="cloud-line">╰◟◞ ͜ ◟◞╯　　༄༅༄༅ 🧸🍬🍭</div>
                <div class="cloud-line">༄༅ 🎁 🎈 🎀</div>
            </div>
        </div>
        <div class="cool-breeze">
            <span class="cool-item">🍬</span><span class="cool-item">🍭</span><span class="cool-item">🎈</span><span class="cool-item">🧸</span><span class="cool-item">✨</span>
        </div>
        <div class="blessing">🎉 祝熊国会儿童节快乐！童心永驻，可爱无敌 🎉</div>
        <div class="blessing blessing-dual">🎉 小熊陪你每一天，快乐成长 ۶•͈⚇•͈ა 🎉</div>

        <!-- 🌟 我想你了按钮区域 (全局统一计数) -->
        <div class="miss-you-area">
            <button class="heart-miss-btn" id="missYouHeartBtn" aria-label="我想你了">❤️</button>
            <div class="miss-counter-box">
                <span>💌 想念次数</span>
                <span class="miss-count" id="missCountDisplay">…</span>
                <span class="last-time" id="lastClickTimeDisplay">加载中…</span>
                <span class="global-badge" id="globalBadge">🌐 全球统一</span>
            </div>
            <div class="history-badge" id="historyHint">✨ 每次想念都被珍藏 ✨</div>
        </div>

        <div style="margin-top: 1rem; font-size:1rem; color:#b45f3b;">🎀 愿你永远像孩子一样，被世界温柔以待 🎀</div>

        <!-- 游戏入口按钮 -->
        <button class="game-btn" id="openGameBtn">🎮 糖果大作战 · 戳我玩 🍬</button>
    </div>

    <div id="bgCloudContainer"></div>

    <!-- 小狗区域 (右下角) -->
    <div class="dog-container" id="dogContainer">
        <img id="dogImage" src="dog.jpg" class="dog-image" alt="小狗">
        <div class="dog-tip" id="dogTip">🐶 单击看视频 · 双击转圈圈</div>
    </div>

    <!-- 视频模态框 -->
    <div id="videoModal" class="video-modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModalBtn">&times;</span>
            <video id="loveVideo" controls autoplay muted playsinline>
                <source src="61.mp4" type="video/mp4">
            </video>
            <div class="video-caption">🎁 专属你的儿童节小电影 🎁</div>
        </div>
    </div>

    <!-- 游戏模态框 -->
    <div id="gameModal" class="game-modal">
        <div class="modal-content" style="background: transparent; border: none; box-shadow: none; padding: 0;">
            <div class="game-container">
                <div class="game-header">
                    <span>🍬 糖果收集者 🍬</span>
                    <span>⏱️ <span id="timerDisplay">15</span>s</span>
                    <span>🍭 <span id="scoreDisplay">0</span></span>
                </div>
                <canvas id="gameCanvas" class="game-canvas" width="450" height="450"></canvas>
                <div class="game-message" id="gameMessage">点击糖果，越快越多！</div>
                <button class="restart-btn" id="restartGameBtn">✨ 再玩一次 ✨</button>
                <span class="close-modal" id="closeGameBtn" style="position: static; margin-top: 12px; background: #ffaa77; color: #5c2e0e; display: inline-block; width: auto; padding: 6px 20px; border-radius: 60px; font-size: 0.9rem;">关闭游戏</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========= 原有特效：吹风、背景云、爱心 =========
            const bodyEl = document.body;
            let particleInterval = null;
            const coolItems = ['🍬', '🍭', '🎈', '🧸', '🎀', '✨', '🍬', '🍭', '💖', '🎁'];

            function createWindParticle() {
                const particle = document.createElement('div');
                particle.classList.add('floating-particle');
                particle.innerHTML = coolItems[Math.floor(Math.random() * coolItems.length)];
                const size = 1 + Math.random() * 1.2;
                particle.style.fontSize = `${size}rem`;
                particle.style.left = Math.random() * window.innerWidth + 'px';
                particle.style.top = window.innerHeight + 20 + 'px';
                const duration = 4 + Math.random() * 3;
                particle.style.animation = `blowWind ${duration}s linear forwards`;
                particle.style.transform = `rotate(${Math.random() * 60}deg)`;
                bodyEl.appendChild(particle);
                particle.addEventListener('animationend', () => particle.remove());
            }

            function startCoolBreeze() {
                if (particleInterval) clearInterval(particleInterval);
                particleInterval = setInterval(() => {
                    if (document.hidden) return;
                    for (let i = 0; i < (Math.random() * 2 + 1); i++) createWindParticle();
                }, 600);
            }

            function createBgClouds() {
                const container = document.getElementById('bgCloudContainer');
                if (!container) return;
                container.innerHTML = '';
                for (let i = 0; i < 6; i++) {
                    const cloud = document.createElement('div');
                    cloud.classList.add('bg-cloud');
                    cloud.style.width = 200 + Math.random() * 350 + 'px';
                    cloud.style.height = 100 + Math.random() * 180 + 'px';
                    cloud.style.left = Math.random() * 80 + '%';
                    cloud.style.top = Math.random() * 80 + '%';
                    cloud.style.opacity = 0.3 + Math.random() * 0.3;
                    cloud.style.background = `radial-gradient(circle, rgba(255,245,230,0.8), rgba(255,220,190,0.5))`;
                    cloud.style.animationDelay = Math.random() * 10 + 's';
                    container.appendChild(cloud);
                }
            }

            function createFloatingHearts() {
                setInterval(() => {
                    if (document.hidden) return;
                    const heartSpan = document.createElement('div');
                    heartSpan.style.position = 'fixed';
                    heartSpan.style.bottom = '-20px';
                    heartSpan.style.left = Math.random() * window.innerWidth + 'px';
                    heartSpan.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
                    heartSpan.style.pointerEvents = 'none';
                    heartSpan.style.zIndex = '25';
                    heartSpan.style.filter = 'drop-shadow(0 0 6px #ff99aa)';
                    heartSpan.style.animation = 'floatUpHeart 5s ease-in forwards';
                    heartSpan.innerHTML = ['❤️', '💖', '🧡', '💛', '💚', '🎈', '🍭'][Math.floor(Math.random() * 7)];
                    document.body.appendChild(heartSpan);
                    heartSpan.addEventListener('animationend', () => heartSpan.remove());
                }, 1500);
            }

            function addClickBreezeEffect(e) {
                if (e.target.closest('.game-modal') || e.target.closest('.video-modal')) return;
                const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                if (!x && !y) return;
                for (let i = 0; i < 4; i++) {
                    const p = document.createElement('div');
                    p.style.position = 'fixed';
                    p.style.left = x + (Math.random() - 0.5) * 30 + 'px';
                    p.style.top = y + (Math.random() - 0.5) * 30 + 'px';
                    p.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
                    p.style.pointerEvents = 'none';
                    p.style.zIndex = '999';
                    p.style.animation = 'clickPopFade 0.9s forwards';
                    p.innerHTML = ['🍬', '🍭', '🎈', '❤️'][Math.floor(Math.random() * 4)];
                    document.body.appendChild(p);
                    p.addEventListener('animationend', () => p.remove());
                }
            }

            function initFanSwing() {
                const fanIcon = document.querySelector('.fan-icon');
                if (fanIcon) setInterval(() => fanIcon.style.transform = `rotate(${Math.sin(Date.now()/500)*12}deg)`, 100);
            }
            startCoolBreeze();
            createBgClouds();
            createFloatingHearts();
            initFanSwing();
            window.addEventListener('click', addClickBreezeEffect);
            window.addEventListener('beforeunload', () => particleInterval && clearInterval(particleInterval));

            // ========= 全局想念计数器 (使用 countapi.xyz 实现跨用户统一计数) =========
            const missBtn = document.getElementById('missYouHeartBtn');
            const missCountSpan = document.getElementById('missCountDisplay');
            const lastTimeSpan = document.getElementById('lastClickTimeDisplay');
            const historyHint = document.getElementById('historyHint');
            const globalBadge = document.getElementById('globalBadge');

            // 全局计数API配置
            const API_NAMESPACE = 'xgh61miss';
            const API_KEY_COUNTER = 'counter';
            const API_KEY_LASTTIME = 'lasttime';
            const API_BASE = 'https://api.countapi.xyz';
            const FETCH_TIMEOUT = 4000; // 4秒超时

            // 当前缓存的值
            let globalCount = 0;
            let globalLastTime = null;
            let apiAvailable = false;

            // 带超时的fetch
            function fetchWithTimeout(url, timeout = FETCH_TIMEOUT) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);
                return fetch(url, { signal: controller.signal })
                    .then(response => {
                        clearTimeout(timeoutId);
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        return response.json();
                    })
                    .catch(err => {
                        clearTimeout(timeoutId);
                        throw err;
                    });
            }

            // 从全局API获取计数
            async function fetchGlobalCount() {
                try {
                    const data = await fetchWithTimeout(`${API_BASE}/get/${API_NAMESPACE}/${API_KEY_COUNTER}`);
                    if (data && typeof data.value === 'number') {
                        globalCount = data.value;
                        apiAvailable = true;
                        return data.value;
                    }
                } catch (e) {
                    console.warn('🌐 全局计数API获取失败，使用本地缓存:', e.message);
                    apiAvailable = false;
                }
                return null;
            }

            // 从全局API获取最后时间
            async function fetchGlobalLastTime() {
                try {
                    const data = await fetchWithTimeout(`${API_BASE}/get/${API_NAMESPACE}/${API_KEY_LASTTIME}`);
                    if (data && typeof data.value === 'number' && data.value > 0) {
                        globalLastTime = data.value;
                        return data.value;
                    }
                } catch (e) {
                    console.warn('🌐 全局时间API获取失败:', e.message);
                }
                return null;
            }

            // 增加全局计数
            async function hitGlobalCount() {
                try {
                    const data = await fetchWithTimeout(`${API_BASE}/hit/${API_NAMESPACE}/${API_KEY_COUNTER}`);
                    if (data && typeof data.value === 'number') {
                        globalCount = data.value;
                        apiAvailable = true;
                        return data.value;
                    }
                } catch (e) {
                    console.warn('🌐 全局计数更新失败:', e.message);
                    apiAvailable = false;
                }
                return null;
            }

            // 设置全局最后时间
            async function setGlobalLastTime(timestamp) {
                try {
                    await fetchWithTimeout(`${API_BASE}/set/${API_NAMESPACE}/${API_KEY_LASTTIME}?value=${timestamp}`);
                    globalLastTime = timestamp;
                } catch (e) {
                    console.warn('🌐 全局时间更新失败:', e.message);
                }
            }

            // 格式化时间显示
            function formatTime(timestamp) {
                if (!timestamp || timestamp === 0) return '还没按过呢';
                const date = new Date(timestamp);
                return `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}:${date.getSeconds().toString().padStart(2,'0')}`;
            }

            // 更新UI显示
            function updateMissDisplay() {
                missCountSpan.textContent = globalCount;
                lastTimeSpan.textContent = '🕒 ' + formatTime(globalLastTime);

                if (globalCount > 0) {
                    historyHint.innerHTML = `💗 全世界已经想念了 ${globalCount} 次，小狗都知道啦 💗`;
                } else {
                    historyHint.innerHTML = '✨ 每次想念都被珍藏 ✨';
                }

                if (apiAvailable) {
                    globalBadge.textContent = '🌐 全球同步';
                    globalBadge.style.color = '#2e8b57';
                } else {
                    globalBadge.textContent = '📱 本地模式';
                    globalBadge.style.color = '#b8782e';
                }
            }

            // 初始化：从API加载数据
            async function initMissCounter() {
                missCountSpan.textContent = '…';
                lastTimeSpan.textContent = '加载中…';

                const countResult = await fetchGlobalCount();
                const timeResult = await fetchGlobalLastTime();

                if (countResult !== null) {
                    globalCount = countResult;
                } else {
                    // API不可用，回退到localStorage
                    try {
                        const stored = localStorage.getItem('bear_miss_you_data');
                        if (stored) {
                            const parsed = JSON.parse(stored);
                            globalCount = parsed.count || 0;
                            globalLastTime = parsed.lastTime || null;
                        }
                    } catch (e) {
                        globalCount = 0;
                        globalLastTime = null;
                    }
                    apiAvailable = false;
                }

                if (timeResult !== null) {
                    globalLastTime = timeResult;
                }

                updateMissDisplay();
            }

            // 点击想念按钮
            missBtn.addEventListener('click', async function(e) {
                e.stopPropagation();

                // 先乐观更新UI
                const now = Date.now();
                globalCount++;
                globalLastTime = now;
                updateMissDisplay();

                // 保存到localStorage作为备份
                try {
                    localStorage.setItem('bear_miss_you_data', JSON.stringify({
                        count: globalCount,
                        lastTime: now
                    }));
                } catch (e) {}

                // 异步更新全局API
                const apiCountResult = await hitGlobalCount();
                if (apiCountResult !== null) {
                    globalCount = apiCountResult;
                }
                // 更新时间戳
                setGlobalLastTime(now);
                // 刷新显示
                updateMissDisplay();

                // 飞出小心心特效
                const rect = missBtn.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                for (let i = 0; i < 8; i++) {
                    const heart = document.createElement('div');
                    heart.innerHTML = ['💖', '❤️', '💕', '💗', '💘', '💝', '✨', '🌸'][Math.floor(Math.random() * 8)];
                    heart.style.position = 'fixed';
                    heart.style.left = centerX + (Math.random() - 0.5) * 30 + 'px';
                    heart.style.top = centerY + (Math.random() - 0.5) * 20 + 'px';
                    heart.style.fontSize = (1.2 + Math.random() * 1.3) + 'rem';
                    heart.style.pointerEvents = 'none';
                    heart.style.zIndex = '999';
                    heart.style.animation = 'clickPopFade 0.8s ease-out forwards';
                    document.body.appendChild(heart);
                    heart.addEventListener('animationend', () => heart.remove());
                }
            });

            // 启动计数器初始化
            initMissCounter();

            // ========= 小狗模块 =========
            const dogImage = document.getElementById('dogImage');
            const dogTip = document.getElementById('dogTip');

            // 视频模块
            const modalVideo = document.getElementById('videoModal');
            const video = document.getElementById('loveVideo');
            const closeVideo = document.getElementById('closeModalBtn');

            function openVideo() {
                modalVideo.classList.add('active');
                video.muted = false;
                video.play().catch(e => {});
            }

            function closeVideoModal() {
                modalVideo.classList.remove('active');
                video.pause();
                video.currentTime = 0;
            }
            closeVideo.addEventListener('click', closeVideoModal);
            modalVideo.addEventListener('click', (e) => {
                if (e.target === modalVideo) closeVideoModal();
            });

            // 小狗单击/双击逻辑
            let clickTimer = null;
            const dogContainer = document.getElementById('dogContainer');

            dogContainer.addEventListener('click', (e) => {
                e.stopPropagation();
                if (clickTimer) {
                    clearTimeout(clickTimer);
                    clickTimer = null;
                    // 双击：转圈圈动画
                    dogImage.classList.remove('dog-spin', 'dog-bounce');
                    void dogImage.offsetWidth;
                    dogImage.classList.add('dog-spin');
                    dogTip.innerHTML = '🌀 小狗转圈圈啦！ 🌀';
                    setTimeout(() => {
                        dogImage.classList.remove('dog-spin');
                        dogTip.innerHTML = '🐶 单击看视频 · 双击转圈圈';
                    }, 600);
                } else {
                    clickTimer = setTimeout(() => {
                        openVideo();
                        clickTimer = null;
                    }, 180);
                }
            });

            // 图片加载失败时的兜底提示
            dogImage.addEventListener('error', function() {
                dogTip.innerHTML = '⚠️ 图片 dog.jpg 未找到，请放在同级目录下';
                this.style.border = '3px solid #ff6666';
                this.style.background = '#ffe8e8';
            });

            // 图片加载成功
            dogImage.addEventListener('load', function() {
                dogTip.innerHTML = '🐶 单击看视频 · 双击转圈圈';
            });

            // ========= 游戏模块 =========
            const gameModal = document.getElementById('gameModal');
            const openGameBtn = document.getElementById('openGameBtn');
            const closeGameBtn = document.getElementById('closeGameBtn');
            const gameCanvas = document.getElementById('gameCanvas');
            const gCtx = gameCanvas.getContext('2d');
            const timerSpan = document.getElementById('timerDisplay');
            const scoreSpan = document.getElementById('scoreDisplay');
            const gameMessageDiv = document.getElementById('gameMessage');
            const restartBtn = document.getElementById('restartGameBtn');

            let gameActive = false;
            let score = 0;
            let timeLeft = 15;
            let intervalId = null;
            let animationId = null;

            let candies = [];
            const CANDY_COUNT = 6;
            const RADIUS = 20;

            function initCandies() {
                candies = [];
                for (let i = 0; i < CANDY_COUNT; i++) {
                    candies.push({
                        x: 40 + Math.random() * (gameCanvas.width - 80),
                        y: 40 + Math.random() * (gameCanvas.height - 80),
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2
                    });
                }
            }

            function drawCandies() {
                gCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
                gCtx.fillStyle = '#fdf3e0';
                gCtx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                for (let c of candies) {
                    gCtx.save();
                    gCtx.shadowBlur = 6;
                    gCtx.shadowColor = "rgba(0,0,0,0.2)";
                    gCtx.font = `${RADIUS*1.5}px "Segoe UI Emoji"`;
                    gCtx.fillStyle = '#ffaa66';
                    gCtx.beginPath();
                    gCtx.arc(c.x, c.y, RADIUS - 2, 0, Math.PI * 2);
                    gCtx.fill();
                    gCtx.fillStyle = '#d45a1a';
                    gCtx.font = `${RADIUS*1.4}px "Segoe UI Emoji"`;
                    gCtx.fillText('🍬', c.x - 12, c.y + 10);
                    gCtx.restore();
                }
            }

            function updateCandies() {
                if (!gameActive) return;
                for (let c of candies) {
                    c.x += c.vx;
                    c.y += c.vy;
                    if (c.x - RADIUS < 0) { c.x = RADIUS;
                        c.vx = -c.vx; }
                    if (c.x + RADIUS > gameCanvas.width) { c.x = gameCanvas.width - RADIUS;
                        c.vx = -c.vx; }
                    if (c.y - RADIUS < 0) { c.y = RADIUS;
                        c.vy = -c.vy; }
                    if (c.y + RADIUS > gameCanvas.height) { c.y = gameCanvas.height - RADIUS;
                        c.vy = -c.vy; }
                }
                drawCandies();
                animationId = requestAnimationFrame(updateCandies);
            }

            function handleCanvasClick(e) {
                if (!gameActive) return;
                const rect = gameCanvas.getBoundingClientRect();
                const scaleX = gameCanvas.width / rect.width;
                const scaleY = gameCanvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                const canvasX = (clientX - rect.left) * scaleX;
                const canvasY = (clientY - rect.top) * scaleY;
                for (let i = 0; i < candies.length; i++) {
                    const c = candies[i];
                    const dx = canvasX - c.x;
                    const dy = canvasY - c.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < RADIUS) {
                        score++;
                        scoreSpan.innerText = score;
                        c.x = 40 + Math.random() * (gameCanvas.width - 80);
                        c.y = 40 + Math.random() * (gameCanvas.height - 80);
                        c.vx = (Math.random() - 0.5) * 2.5;
                        c.vy = (Math.random() - 0.5) * 2.5;
                        gameMessageDiv.innerHTML = '🎉 +1 好甜！ 🎉';
                        setTimeout(() => { if (gameActive) gameMessageDiv.innerHTML = '继续点糖果！'; }, 400);
                        break;
                    }
                }
            }

            function startGame() {
                if (intervalId) clearInterval(intervalId);
                if (animationId) cancelAnimationFrame(animationId);
                gameActive = true;
                score = 0;
                timeLeft = 15;
                scoreSpan.innerText = '0';
                timerSpan.innerText = '15';
                gameMessageDiv.innerHTML = '快戳糖果！🍬';
                initCandies();
                drawCandies();
                updateCandies();
                intervalId = setInterval(() => {
                    if (!gameActive) return;
                    timeLeft--;
                    timerSpan.innerText = timeLeft;
                    if (timeLeft <= 0) {
                        gameActive = false;
                        clearInterval(intervalId);
                        if (animationId) cancelAnimationFrame(animationId);
                        gameMessageDiv.innerHTML = `⏰ 时间到啦！你收集了 ${score} 颗糖果！ 🎁`;
                        gCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
                        gCtx.fillStyle = '#fdf3e0';
                        gCtx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                        gCtx.font = 'bold 24px "Segoe UI"';
                        gCtx.fillStyle = '#d96c1e';
                        gCtx.fillText('🎉 GAME OVER 🎉', gameCanvas.width / 2 - 100, gameCanvas.height / 2);
                    }
                }, 1000);
            }

            function stopGameAndClose() {
                gameActive = false;
                if (intervalId) clearInterval(intervalId);
                if (animationId) cancelAnimationFrame(animationId);
                gameModal.classList.remove('active');
            }

            openGameBtn.addEventListener('click', () => {
                if (gameModal.classList.contains('active')) return;
                startGame();
                gameModal.classList.add('active');
            });
            closeGameBtn.addEventListener('click', stopGameAndClose);
            restartBtn.addEventListener('click', () => {
                stopGameAndClose();
                setTimeout(() => {
                    startGame();
                    gameModal.classList.add('active');
                }, 100);
            });
            gameCanvas.addEventListener('click', handleCanvasClick);
            gameCanvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCanvasClick(e);
            });
            gameModal.addEventListener('click', (e) => { if (e.target === gameModal) stopGameAndClose(); });
        })();
    </script>
</body>
</html>
