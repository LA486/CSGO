<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小熊的记事本 📝</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b0b1a 0%, #1a1a2e 30%, #16213e 70%, #0f3460 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            perspective: 1500px;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }
        .stars, .nebula, .shooting-stars, .fireflies, .aurora, .stardust {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;          /* 回退 */
            height: 100dvh;         /* 动态视口高度，移动端完美适配 */
            pointer-events: none;
        }
        .nebula { z-index: -1; }
        .aurora { z-index: -1; }
        .stars { z-index: 0; }
        .stardust { z-index: 0; }
        .shooting-stars { z-index: 1; }
        .fireflies { z-index: 1; }

        /* 星云光晕 */
        .nebula-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            animation: nebulaDrift 30s infinite alternate ease-in-out;
        }
        @keyframes nebulaDrift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -40px) scale(1.1); }
        }

        /* 细密星空 */
        .star-particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 3s infinite alternate ease-in-out;
        }
        @keyframes starTwinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 0.9; transform: scale(1.1); }
        }

        /* 极光光带 */
        .aurora-band {
            position: absolute;
            height: 200px;
            width: 80%;
            opacity: 0.2;
            border-radius: 50%;
            filter: blur(30px);
            animation: auroraFloat 20s infinite alternate ease-in-out;
            background: linear-gradient(180deg, rgba(0,255,128,0.3) 0%, rgba(128,0,255,0.1) 100%);
        }
        .aurora-band:nth-child(1) {
            top: 5%;
            left: -20%;
            background: linear-gradient(180deg, rgba(0,255,200,0.4) 0%, rgba(100,0,255,0.15) 100%);
            animation-delay: 0s;
            transform: rotate(-8deg);
        }
        .aurora-band:nth-child(2) {
            top: 15%;
            left: -10%;
            background: linear-gradient(180deg, rgba(128,0,255,0.3) 0%, rgba(0,200,255,0.1) 100%);
            animation-delay: -7s;
            transform: rotate(5deg);
        }
        .aurora-band:nth-child(3) {
            top: 25%;
            left: 0%;
            background: linear-gradient(180deg, rgba(255,0,128,0.2) 0%, rgba(0,100,255,0.1) 100%);
            animation-delay: -14s;
            transform: rotate(-3deg);
        }
        @keyframes auroraFloat {
            0% { transform: translateX(-5%) translateY(0) rotate(-8deg); opacity: 0.15; }
            50% { transform: translateX(5%) translateY(-20px) rotate(2deg); opacity: 0.3; }
            100% { transform: translateX(-2%) translateY(10px) rotate(5deg); opacity: 0.2; }
        }

        /* 星尘漩涡 */
        .stardust-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: stardustRotate 15s linear infinite;
        }
        @keyframes stardustRotate {
            0% { transform: rotate(0deg) translateX(80px) rotate(0deg); opacity: 0.2; }
            50% { opacity: 0.8; }
            100% { transform: rotate(360deg) translateX(80px) rotate(-360deg); opacity: 0.2; }
        }

        /* 流星（优化版） */
        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.9) 40%, transparent 100%);
            border-radius: 1px;
            animation: shoot linear forwards;
            filter: drop-shadow(0 0 5px rgba(180,200,255,0.7));
        }
        .shooting-star::after {
            content: "";
            position: absolute;
            right: 0;
            top: -1px;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(180,200,255,0.6);
        }
        .shooting-star.colored {
            background: linear-gradient(90deg, transparent 0%, #fbbf24 40%, transparent 100%);
            filter: drop-shadow(0 0 5px #fbbf24);
        }
        .shooting-star.colored::after {
            background: #fde68a;
            box-shadow: 0 0 10px 3px #fbbf24;
        }
        @keyframes shoot {
            0% { 
                transform: translateX(0) translateY(0) rotate(var(--angle)); 
                opacity: 0;
            }
            5% { opacity: 1; }
            70% { opacity: 1; }
            100% { 
                transform: translateX(-350px) translateY(500px) rotate(var(--angle)); 
                opacity: 0;
            }
        }

        /* 萤火虫（飞过型） */
        .firefly {
            position: absolute;
            width: 4px; height: 4px;
            background: #fde68a;
            border-radius: 50%;
            box-shadow: 0 0 12px 4px #fbbf24, 0 0 20px 8px rgba(251,191,36,0.3);
            animation: fireflyFly 6s linear forwards;
        }
        @keyframes fireflyFly {
            0% { transform: translate(0, 0) scale(0.8); opacity: 0; }
            5% { opacity: 0.8; transform: scale(1.2); }
            20% { transform: translate(40px, -80px) scale(1); }
            40% { transform: translate(90px, -160px) scale(1.1); }
            60% { transform: translate(130px, -240px) scale(0.9); }
            80% { opacity: 0.5; transform: translate(170px, -320px) scale(0.7); }
            100% { opacity: 0; transform: translate(200px, -400px) scale(0.4); }
        }

        /* 主内容容器 */
        .main-container { width: 100%; max-width: 800px; z-index: 10; display: flex; flex-direction: column; gap: 1.5rem; }
        .header { text-align: center; color: #e0d4ff; animation: fadeSlideDown 0.8s ease-out; }
        .header h1 { font-size: 2.2rem; background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 0.3rem; }
        .header p { color: #94a3b8; font-size: 0.9rem; }
        .back-btn { display: inline-block; margin-top: 0.8rem; padding: 0.4rem 1.5rem; border-radius: 30px; background: rgba(255,255,255,0.1); color: #c4b5fd; text-decoration: none; font-size: 0.9rem; font-weight: bold; border: 1px solid rgba(196,181,253,0.3); transition: all 0.3s; }
        .back-btn:hover { background: rgba(196,181,253,0.2); border-color: #a78bfa; }

        .card-wrapper { perspective: 1500px; animation: fadeSlideUp 0.8s ease-out 0.2s both; }
        @keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .card-inner { position: relative; width: 100%; min-height: 450px; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; min-height: 450px; backface-visibility: hidden; border-radius: 30px; background: rgba(30,27,50,0.95); border: 2px solid rgba(167,139,250,0.3); box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 40px rgba(139,92,246,0.1); padding: 2rem; }
        .card-back { transform: rotateY(180deg); background: rgba(20,15,40,0.95); border-color: rgba(244,114,182,0.3); }

        .tabs-area { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.2rem; padding-bottom: 0.8rem; border-bottom: 1px solid rgba(167,139,250,0.2); align-items: center; }
        .tab-btn { padding: 0.4rem 1rem; border-radius: 25px; border: 2px solid rgba(167,139,250,0.3); background: rgba(167,139,250,0.1); color: #c4b5fd; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: all 0.3s; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
        .tab-btn.active { background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; border-color: transparent; }
        .tab-btn:hover:not(.active) { border-color: #a78bfa; background: rgba(167,139,250,0.2); }
        .add-tab-btn { padding: 0.4rem 0.7rem; border-radius: 25px; border: 2px dashed rgba(167,139,250,0.3); background: transparent; color: #a78bfa; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: all 0.3s; }
        .add-tab-btn:hover { background: rgba(167,139,250,0.15); border-color: #a78bfa; }

        .textarea-wrap { position: relative; flex: 1; }
        .notepad-textarea { width: 100%; min-height: 280px; max-height: 350px; padding: 1.2rem; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(167,139,250,0.2); color: #e0d4ff; font-size: 1rem; line-height: 1.8; resize: vertical; outline: none; font-family: inherit; transition: all 0.3s; }
        .notepad-textarea:focus { border-color: #a78bfa; box-shadow: 0 0 20px rgba(139,92,246,0.15); }
        .notepad-textarea::placeholder { color: rgba(196,181,253,0.3); }

        .status-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.8rem; flex-wrap: wrap; gap: 0.5rem; }
        .status-text { color: #94a3b8; font-size: 0.8rem; }
        .action-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .action-btn { padding: 0.35rem 1rem; border-radius: 20px; border: 1px solid rgba(167,139,250,0.3); background: rgba(167,139,250,0.1); color: #c4b5fd; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: all 0.3s; display: flex; align-items: center; gap: 4px; }
        .action-btn:hover { background: rgba(167,139,250,0.25); border-color: #a78bfa; }
        .action-btn.danger { color: #f472b6; border-color: rgba(244,114,182,0.3); background: rgba(244,114,182,0.1); }
        .action-btn.danger:hover { background: rgba(244,114,182,0.25); border-color: #f472b6; color: #fb7185; }

        .flip-indicator { text-align: center; margin-top: 1rem; }
        .flip-btn { padding: 0.5rem 1.5rem; border-radius: 25px; background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(244,114,182,0.2)); border: 1px solid rgba(167,139,250,0.3); color: #c4b5fd; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: all 0.3s; }
        .flip-btn:hover { background: linear-gradient(135deg, rgba(139,92,246,0.4), rgba(244,114,182,0.4)); }

        .card-back .back-content { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 350px; text-align: center; color: #e0d4ff; }
        .back-content .warn-icon { font-size: 4rem; margin-bottom: 1rem; }
        .back-content h3 { color: #f472b6; margin-bottom: 0.5rem; }
        .back-content p { color: #94a3b8; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .confirm-btns { display: flex; gap: 0.8rem; }
        .confirm-delete { padding: 0.6rem 2rem; border-radius: 25px; border: none; background: linear-gradient(135deg, #ef4444, #dc2626); color: white; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: all 0.3s; }
        .confirm-delete:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(239,68,68,0.4); }
        .cancel-delete { padding: 0.6rem 2rem; border-radius: 25px; border: 1px solid rgba(167,139,250,0.3); background: rgba(167,139,250,0.1); color: #c4b5fd; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: all 0.3s; }
        .cancel-delete:hover { background: rgba(167,139,250,0.25); }

        .scroll-hint {
            text-align: center;
            color: rgba(255,255,255,0.2);
            margin-top: 3rem;
            font-size: 0.9rem;
            z-index: 10;
        }

        @media (max-width: 600px) {
            .card-front, .card-back { padding: 1.5rem; min-height: 400px; }
            .header h1 { font-size: 1.6rem; }
            .notepad-textarea { min-height: 220px; }
            .tab-btn { max-width: 90px; font-size: 0.75rem; padding: 0.3rem 0.6rem; }
        }
    </style>
</head>

<div class="aurora" id="auroraContainer"></div>
<div class="stars" id="starsContainer"></div>
<div class="stardust" id="stardustContainer"></div>
<div class="shooting-stars" id="shootingStarsContainer"></div>
<div class="fireflies" id="firefliesContainer"></div>

<div class="main-container">
    <div class="header">
        <h1>📝 小熊的记事本 🌐</h1>
        <p>记录甜蜜的每一刻 · 全球同步</p>
        <a href="index.html" class="back-btn">🏠 回到糖果乐园</a>

    <div class="card-wrapper">
        <div class="card-inner" id="cardInner">
            <div class="card-front">
                <div class="tabs-area" id="tabsArea"></div>

                    <div class="action-btns">

                </div>
            </div>
            <div class="card-back">
                <div class="back-content">

                        <button class="confirm-delete" id="confirmDeleteBtn">确认删除</button>
                        <button class="cancel-delete" id="cancelDeleteBtn">取消</button>

                </div>
            </div>
        </div>
        <div class="flip-indicator">
            <button class="flip-btn" id="flipBackBtn">🔄 翻转卡片</button>

    <div class="scroll-hint">

        <p style="margin-top:1rem; font-size:0.8rem;">每一颗星星都为你闪烁</p>
        <p style="margin-top:1rem; font-size:0.8rem;">🌌 愿你今夜好梦 🌌</p>
    </div>
</div>

<script>
(function() {
    const SUPABASE_URL = 'https://cgvnzfbdqmqguagtjhfi.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_W_1tTixY0j-gF8roUH9HRQ__hiuYCLG';
    const MAX_RETRIES = 3;

    async function supabaseRequest(endpoint, options = {}, retry = 0) {
        const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
        const headers = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', ...options.headers };
        try {
            const response = await fetch(url, { ...options, headers, mode: 'cors' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            if (!text) return [];
            return JSON.parse(text);
        } catch (error) {
            if (retry < MAX_RETRIES) { await new Promise(r => setTimeout(r, 1000 * (retry + 1))); return supabaseRequest(endpoint, options, retry + 1); }
            throw error;
        }
    }

    // 极光
    const auroraContainer = document.getElementById('auroraContainer');
    for (let i = 0; i < 3; i++) {
        const band = document.createElement('div');
        band.className = 'aurora-band';
        auroraContainer.appendChild(band);
    }

    // 星空
    const starsContainer = document.getElementById('starsContainer');

        const star = document.createElement('div');
        star.className = 'star-particle';

        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.animationDuration = (2 + Math.random() * 3) + 's';
        starsContainer.appendChild(star);
    }

    // 星尘漩涡

    for (let i = 0; i < 40; i++) {

        particle.className = 'stardust-particle';
        const angle = Math.random() * Math.PI * 2;
        const distance = 60 + Math.random() * 100;
        const centerX = 50, centerY = 50;
        const x = centerX + Math.cos(angle) * (distance / window.innerWidth * 100);
        const y = centerY + Math.sin(angle) * (distance / window.innerHeight * 100);

        particle.style.animationDuration = (10 + Math.random() * 15) + 's';

        particle.style.width = (1 + Math.random() * 2) + 'px';
        particle.style.height = particle.style.width;
        stardustContainer.appendChild(particle);
    }

    // 萤火虫
    const firefliesContainer = document.getElementById('firefliesContainer');

        const firefly = document.createElement('div');

        const startX = Math.random() * 100;

        firefly.style.left = startX + 'vw';

        firefly.style.height = size + 'px';
        firefly.style.animationDuration = (5 + Math.random() * 6) + 's';
        firefliesContainer.appendChild(firefly);
        firefly.addEventListener('animationend', () => firefly.remove());

            createFlyingFirefly();

        star.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';

            notepadTextarea.value = notes[0].content || '';
        }

    function renderTabs() {

        notes.forEach((note, index) => {
            const tab = document.createElement('span');
            tab.className = 'tab-btn' + (index === currentNoteIndex ? ' active' : '');

    function switchNote(index) {

        notes[currentNoteIndex].content = notepadTextarea.value;
        if (isFlipped) flipCard();
        currentNoteIndex = index;
        notepadTextarea.value = notes[index].content || '';
        renderTabs();
        updateStatus('📂 已切换到: ' + notes[index].title);
        notepadTextarea.focus();
    }

    async function addNewNote() {
        notes[currentNoteIndex].content = notepadTextarea.value;
        const newIndex = notes.length;
        notes.push({ title: '新笔记 ' + (newIndex + 1), content: '' });
        currentNoteIndex = newIndex;
        notepadTextarea.value = '';
        renderTabs();
        await saveToServer();
        notepadTextarea.focus();
    }

    function updateStatus(msg) {
        statusText.textContent = msg;
    }

    function flipCard() {
        isFlipped = !isFlipped;
        cardInner.classList.toggle('flipped', isFlipped);
        flipBackBtn.textContent = isFlipped ? '🔄 翻回正面' : '🔄 翻转卡片';
        if (isFlipped) {
            deleteNoteName.textContent = '「' + notes[currentNoteIndex].title + '」';
        }
    }

    notepadTextarea.addEventListener('input', () => {
        if (autoSaveTimer) clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(async () => {
            notes[currentNoteIndex].content = notepadTextarea.value;
            await saveToServer();
        }, 1000);
    });

    flipBackBtn.addEventListener('click', flipCard);
    document.getElementById('deleteBtn').addEventListener('click', () => { if (!isFlipped) flipCard(); });
    document.getElementById('cancelDeleteBtn').addEventListener('click', () => { if (isFlipped) flipCard(); });

    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
        if (notes.length <= 1) { alert('至少保留一个笔记哦~'); flipCard(); return; }
        notes.splice(currentNoteIndex, 1);
        if (currentNoteIndex >= notes.length) currentNoteIndex = notes.length - 1;
        notepadTextarea.value = notes[currentNoteIndex].content || '';
        renderTabs();
        await saveToServer();
        flipCard();
        updateStatus('🗑️ 笔记已删除并同步');
    });

    document.getElementById('renameBtn').addEventListener('click', async () => {
        const newTitle = prompt('请输入新标题：', notes[currentNoteIndex].title);
        if (newTitle && newTitle.trim()) {
            notes[currentNoteIndex].title = newTitle.trim();
            renderTabs();
            await saveToServer();
            updateStatus('✏️ 已重命名: ' + newTitle.trim());
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 's') {
            e.preventDefault();
            notes[currentNoteIndex].content = notepadTextarea.value;
            saveToServer();
            updateStatus('💾 已手动保存并同步');
        }
        if (e.ctrlKey && e.key === 'n') { e.preventDefault(); addNewNote(); }
    });

    loadFromServer();
})();
</script>
</body>
</html>
